<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<link rel="icon" href="good/logo.png?v=3">

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  padding:140px 20px 80px;
  display:flex;
  justify-content:center;
  gap:70px;
  flex-wrap:wrap;
  text-align:center;
}

#work img{
  width:360px;
  cursor:pointer;
  transition:0.3s;
}

.work-item{
  text-align:center;
}

.work-text{
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:5px;
}

#work img:hover{
  transform:scale(1.04);
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
  padding:20px;
}

#panel-title{
  text-align:center;
}

/* GRID */
.video-grid,
.masonry{
  display:none;
  gap:10px;
}

.video-grid{
  grid-template-columns:repeat(3,1fr);
}

.masonry{
  column-count:3;
  column-gap:15px;
}

.project,.video-item{
  break-inside:avoid;
  margin-bottom:10px;
  cursor:pointer;
  position:relative;
}

.project img,.video-item img{
  width:100%;
  display:block;
}

.project-title,.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:6px;
  opacity:0;
}

.project:hover .project-title,
.video-item:hover .video-title{
  opacity:1;
}

/* PLAYER */
#player{
  width:100%;
  height:420px;
  display:none;
  border:none;
}

/* INTRO */
#intro{
  margin-top:10px;
  font-size:18px;
  line-height:1.6;
  display:none;
}

#close-area{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<div class="work-item" id="work-video">
  <div class="work-text">VIDEO</div>
  <img src="good/ca.webp">
</div>

<div class="work-item" id="work-design">
  <div class="work-text">DESIGN</div>
  <img src="good/table.webp">
</div>

<div class="work-item" id="work-3d">
  <div class="work-text">3D</div>
  <img src="good/com.webp">
</div>

</section>

<!-- OVERLAY -->
<div id="overlay">
<div id="close-area"></div>

<div id="panel">
<h2 id="panel-title"></h2>

<!-- VIDEO -->
<div class="video-grid" id="videoGrid">

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s')">
<img src="video/aids.jpg">
<div class="video-title">愛滋教育紀錄片</div>
</div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q')">
<img src="video/crime.jpg">
<div class="video-title">創傷與修復</div>
</div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY')">
<img src="video/hurt.jpg">
<div class="video-title">與傷共行</div>
</div>

</div>

<!-- DESIGN -->
<div class="masonry" id="designGrid">

<div class="project" onclick="alert('設計作品：移面之詞')">
<img src="design/shift.jpg">
<div class="project-title">移面之詞主視覺</div>
</div>

<div class="project" onclick="alert('設計作品：影展海報')">
<img src="design/filmfestival.png">
<div class="project-title">瘋影展海報</div>
</div>

</div>

<!-- 3D -->
<div class="masonry" id="threeDGrid">

<div class="project" onclick="alert('3D作品：展場設計')">
<img src="d/shixian/shixian1.jpg">
<div class="project-title">世賢圖書館展場</div>
</div>

</div>

<!-- PLAYER + INTRO -->
<iframe id="player"></iframe>
<div id="intro"></div>

</div>
</div>

<script>
const overlay = document.getElementById("overlay")
const videoGrid = document.getElementById("videoGrid")
const designGrid = document.getElementById("designGrid")
const threeDGrid = document.getElementById("threeDGrid")
const player = document.getElementById("player")
const intro = document.getElementById("intro")
const panelTitle = document.getElementById("panel-title")

let state = "home"

/* 打開分類 */
document.getElementById("work-video").onclick = () => {
  overlay.style.display = "flex"
  videoGrid.style.display = "grid"
  designGrid.style.display = "none"
  threeDGrid.style.display = "none"
  player.style.display = "none"
  intro.style.display = "none"
  panelTitle.textContent = "VIDEO"
}

document.getElementById("work-design").onclick = () => {
  overlay.style.display = "flex"
  videoGrid.style.display = "none"
  designGrid.style.display = "block"
  threeDGrid.style.display = "none"
  player.style.display = "none"
  intro.style.display = "none"
  panelTitle.textContent = "DESIGN"
}

document.getElementById("work-3d").onclick = () => {
  overlay.style.display = "flex"
  videoGrid.style.display = "none"
  designGrid.style.display = "none"
  threeDGrid.style.display = "block"
  player.style.display = "none"
  intro.style.display = "none"
  panelTitle.textContent = "3D"
}

/* 點影片 → 自動播放 + 介紹 */
function openVideo(url){
  overlay.style.display = "flex"
  videoGrid.style.display = "none"
  designGrid.style.display = "none"
  threeDGrid.style.display = "none"

  player.style.display = "block"
  player.src = url + "?autoplay=1"

  intro.style.display = "block"
  intro.innerText = "影片介紹：這是一部影像作品，用於紀錄與敘事創作。"

  panelTitle.textContent = "VIDEO"
}

/* 關閉 */
document.getElementById("close-area").onclick = () => {
  overlay.style.display = "none"
  player.src = ""
  player.style.display = "none"
  intro.style.display = "none"

  state = "home"
}
</script>

</body>
</html>
