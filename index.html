<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h1{ font-size:60px; font-weight: normal; margin:0; }
h2{ font-size:36px; margin:0; }
section{ padding:120px 20px; text-align:center; }

/* ===== HERO 影片 ===== */
#hero{
    position:relative;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

#bg-video{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

.hero-text{
    color:#fff;
    text-align:center;
    text-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* ===== Work ===== */
.category-btns{ margin:30px 0; }

.category-btns button{
    background:#D6CFC4;
    color:#87240E;
    border:2px solid #87240E;
    padding:10px 20px;
    margin:0 5px;
    cursor:pointer;
    font-family:'MantouSans';
}

.category-btns button.active{
    background:#87240E;
    color:#D6CFC4;
}

/* masonry */
#all-projects{
    column-count:3;
    column-gap:20px;
    max-width:1100px;
    margin:40px auto;
}

@media (max-width:800px){
    #all-projects{ column-count:2; }
}

.project{
    break-inside:avoid;
    margin-bottom:20px;
    cursor:pointer;
    position:relative;
}

.project img{ width:100%; display:block; }

.project-title{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.4);
    color:#fff;
    padding:10px;
    opacity:0;
    transition:0.3s;
}

.project:hover .project-title{ opacity:1; }

/* overlay */
#overlay{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
}

#project-panel{
    background:#D6CFC4;
    padding:30px;
    max-width:800px;
    width:90%;
}

#panel-img{ max-width:60%; }
#panel-video{ width:70%; height:380px; }

#panel-close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:28px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="good/曾珮甄.mp4" type="video/mp4">
  </video>

  <div class="hero-text">
    <h1>曾珮甄作品集</h1>
    <p>Video / Design / 3D</p>
  </div>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<div class="category-btns">
  <button data-cat="all" class="active">All</button>
  <button data-cat="video">Video</button>
  <button data-cat="design">Design</button>
  <button data-cat="3d">3D</button>
</div>

<div id="all-projects">

  <!-- 範例 -->
  <div class="project" data-cat="design" data-title="作品" data-description="描述">
    <img src="design/shift.jpg">
    <div class="project-title">作品</div>
  </div>

</div>
</section>

<!-- overlay -->
<div id="overlay">
  <div id="project-panel">
    <span id="panel-close">✕</span>
    <img id="panel-img">
    <iframe id="panel-video"></iframe>
    <h2 id="panel-title"></h2>
    <p id="panel-text"></p>
  </div>
</div>

<script>
const projects=document.querySelectorAll(".project")
const overlay=document.getElementById("overlay")
const panelImg=document.getElementById("panel-img")
const panelVideo=document.getElementById("panel-video")
const panelTitle=document.getElementById("panel-title")
const panelText=document.getElementById("panel-text")

projects.forEach(project=>{
  project.onclick=()=>{
    overlay.style.display="flex"
    panelTitle.textContent=project.dataset.title
    panelText.textContent=project.dataset.description
    panelImg.src=project.querySelector("img").src
  }
})

overlay.onclick=()=>{
  overlay.style.display="none"
  panelVideo.src=""
}
</script>

</body>
</html>
