<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<link rel="icon" href="good/logo.png?v=3">

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

/* WORK */
#work{
  padding:140px 20px 80px;
  display:flex;
  justify-content:center;
  gap:70px;
  flex-wrap:wrap;
  text-align:center;
}

#work img{
  width:360px;
  cursor:pointer;
  transition:0.3s;
}

.work-text{
  font-size:28px;
  letter-spacing:2px;
  color:#87240E;
  margin-bottom:5px;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  padding:25px;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
}

#panel-title{
  text-align:center;
  margin-bottom:10px;
}

/* GRID */
.video-grid,.masonry{
  display:none;
}

.video-grid{
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.masonry{
  column-count:3;
  column-gap:15px;
}

/* ITEMS */
.project,.video-item{
  break-inside:avoid;
  margin-bottom:10px;
  cursor:pointer;
  position:relative;
}

.project img,.video-item img{
  width:100%;
  display:block;
}

.title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:6px;
  opacity:0;
}

.project:hover .title,
.video-item:hover .title{
  opacity:1;
}

/* PLAYER + IMAGE */
#player{
  width:100%;
  height:420px;
  display:none;
  border:none;
}

#imgViewer{
  width:100%;
  display:none;
}

/* CLOSE */
#close-area{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<!-- HERO（完整保留） -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK（完整保留） -->
<section id="work">

<div class="work-item" id="work-video">
  <div class="work-text">VIDEO</div>
  <img src="good/ca.webp">
</div>

<div class="work-item" id="work-design">
  <div class="work-text">DESIGN</div>
  <img src="good/table.webp">
</div>

<div class="work-item" id="work-3d">
  <div class="work-text">3D</div>
  <img src="good/com.webp">
</div>

</section>

<!-- OVERLAY -->
<div id="overlay">
<div id="close-area"></div>

<div id="panel">
<h2 id="panel-title"></h2>

<!-- VIDEO（完整9個不刪） -->
<div class="video-grid" id="videoGrid">

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s','愛滋風險教育')">
<img src="video/aids.jpg"><div class="title">愛滋風險教育</div></div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q','犯保重建')">
<img src="video/crime.jpg"><div class="title">犯保重建</div></div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY','與傷共行')">
<img src="video/hurt.jpg"><div class="title">與傷共行</div></div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ODA4hvMLTbk','窄房')">
<img src="video/narrowhouse.png"><div class="title">窄房</div></div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ANlh-9-dZR8','山溝')">
<img src="video/ravine.png"><div class="title">山溝</div></div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/YSA-ws8PeJo','Sony')">
<img src="video/sony.png"><div class="title">Sony工作坊</div></div>

<div class="video-item" onclick="openVideo('https://www.peopo.org/news/822048','文旦')">
<img src="video/wendan.jpg"><div class="title">文旦新聞</div></div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/k5CRxQ0rPTc','傳播營')">
<img src="video/camp.png"><div class="title">傳播營</div></div>

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/iD759dRtgIY','出去走走')">
<img src="video/gogo.jpg"><div class="title">出去走走</div></div>

</div>

<!-- DESIGN（完整保留10個） -->
<div class="masonry" id="designGrid">

<div class="project"><img src="design/shift.jpg"><div class="title">移面之詞</div></div>
<div class="project"><img src="design/filmfestival.png"><div class="title">瘋影展</div></div>
<div class="project"><img src="design/communicationcamp.jpg"><div class="title">傳播營</div></div>
<div class="project"><img src="design/voiceofzhongzheng.jpg"><div class="title">中正之聲</div></div>
<div class="project"><img src="design/eye.png"><div class="title">活動海報</div></div>
<div class="project"><img src="design/fb.png"><div class="title">中正E報</div></div>
<div class="project"><img src="design/ghost.jpg"><div class="title">活動</div></div>
<div class="project"><img src="design/news.png"><div class="title">新傳獎</div></div>
<div class="project"><img src="design/one.png"><div class="title">活動</div></div>
<div class="project"><img src="design/temperature.png"><div class="title">專輯</div></div>

</div>

<!-- 3D（完整保留2個） -->
<div class="masonry" id="threeDGrid">

<div class="project"><img src="d/shixian/shixian1.jpg"><div class="title">世賢圖書館</div></div>
<div class="project"><img src="d/library/library1.jpg"><div class="title">嘉義圖書館</div></div>

</div>

<!-- 顯示區 -->
<iframe id="player" allow="autoplay"></iframe>
<img id="imgViewer">

</div>
</div>

<script>
const overlay=document.getElementById("overlay")
const videoGrid=document.getElementById("videoGrid")
const designGrid=document.getElementById("designGrid")
const threeDGrid=document.getElementById("threeDGrid")
const player=document.getElementById("player")
const imgViewer=document.getElementById("imgViewer")
const panelTitle=document.getElementById("panel-title")

let viewState="home"

/* WORK */
document.getElementById("work-video").onclick=()=>{
  overlay.style.display="flex"
  panelTitle.textContent="VIDEO"
  videoGrid.style.display="grid"
}

document.getElementById("work-design").onclick=()=>{
  overlay.style.display="flex"
  panelTitle.textContent="DESIGN"
  designGrid.style.display="block"
}

document.getElementById("work-3d").onclick=()=>{
  overlay.style.display="flex"
  panelTitle.textContent="3D"
  threeDGrid.style.display="block"
}

/* VIDEO */
function openVideo(url,title){
  overlay.style.display="flex"

  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="none"

  imgViewer.style.display="none"
  player.style.display="block"

  panelTitle.textContent="作品介紹：" + title
  player.src=url + "?autoplay=1"
}

/* IMAGE（design / 3D） */
document.querySelectorAll(".project").forEach(el=>{
  el.onclick=()=>{
    const img=el.querySelector("img").src
    const title=el.querySelector(".title").innerText

    overlay.style.display="flex"

    videoGrid.style.display="none"
    designGrid.style.display="none"
    threeDGrid.style.display="none"

    player.style.display="none"
    imgViewer.style.display="block"

    imgViewer.src=img
    panelTitle.textContent="作品介紹：" + title
  }
})

/* CLOSE */
document.getElementById("close-area").onclick=()=>{
  overlay.style.display="none"
  player.src=""
  imgViewer.src=""
}
</script>

</body>
</html>
