<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h1{ font-size:60px; font-weight: normal; margin:0; }
h2{ font-size:36px; margin:0; }

section{ padding:120px 20px; text-align:center; }

/* NAV */
nav{
    position:fixed;
    top:20px;
    right:20px;
    display:flex;
    gap:20px;
    z-index:10;
}

nav a{
    text-decoration:none;
    color:#87240E;
    font-size:18px;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
  z-index:3;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50%;
  height:50%;
  object-fit:cover;
  z-index:1;
}

/* WORK */
#work-computer{
  display:block;
  margin:20px auto 50px;
  width:260px;
  cursor:pointer;
  transition:0.3s;
}

#work-computer:hover{
  transform:scale(1.05);
}

/* VIDEO 初始隱藏 */
#video-section{
  display:none;
  margin-top:20px;
}

/* PROJECT GRID */
#all-projects{
    column-count:3;
    column-gap:20px;
    max-width:1100px;
    margin:40px auto;
}

@media (max-width:800px){
  #all-projects{ column-count:2; }
}

.project{
    break-inside:avoid;
    margin-bottom:20px;
    cursor:pointer;
    position:relative;
}

.project img{
    width:100%;
    display:block;
}

/* hover title */
.project-title{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.4);
    padding:10px;
    opacity:0;
    transition:0.3s;
    color:#fff;
}

.project:hover .project-title{
    opacity:1;
}

/* overlay */
#overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
    z-index:999;
}

#project-panel{
    background:#D6CFC4;
    color:#87240E;
    padding:30px;
    max-width:800px;
    width:90%;
    max-height:85vh;
    overflow-y:auto;
    border-radius:6px;
    text-align:center;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
}

#panel-img{
    max-width:60%;
    margin-bottom:20px;
}

#panel-video{
    width:70%;
    height:380px;
    margin-bottom:20px;
    border:none;
    display:none;
}

#panel-close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:28px;
    cursor:pointer;
}

#panel-title{
    font-size:28px;
    margin-bottom:15px;
}

#panel-text{
    font-size:18px;
    line-height:1.6;
}

</style>
</head>

<script>
const computer = document.getElementById("work-computer")
const videoSection = document.getElementById("video-section")

// 點電腦 → 開 video
computer.onclick = () => {
  videoSection.style.display = "block"
  videoSection.scrollIntoView({behavior:"smooth"})
}

// 點作品
const projects=document.querySelectorAll(".project")
const overlay=document.getElementById("overlay")
const panelImg=document.getElementById("panel-img")
const panelVideo=document.getElementById("panel-video")
const panelTitle=document.getElementById("panel-title")
const panelText=document.getElementById("panel-text")

projects.forEach(p=>{
  p.onclick=()=>{
    overlay.style.display="flex"
    panelTitle.textContent=p.dataset.title
    panelText.textContent=p.dataset.description

    const v=p.dataset.video

    if(v){
      panelImg.style.display="none"
      panelVideo.style.display="block"
      panelVideo.src=v
    }else{
      panelVideo.style.display="none"
      panelImg.style.display="block"
      panelImg.src=p.querySelector("img").src
    }
  }
})

document.getElementById("panel-close").onclick=()=>{
  overlay.style.display="none"
  panelVideo.src=""
}

overlay.onclick=()=>overlay.style.display="none"
</script>
