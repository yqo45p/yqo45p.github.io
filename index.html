<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
  overflow-x:hidden;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{
  height:220px;
}

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

/* COMPUTER BUTTON */
#work-computer{
  width:320px;
  display:block;
  margin:20px auto;
  cursor:pointer;
  transition:0.3s;
}

#work-computer:hover{
  transform:scale(1.03);
}

/* CATEGORY */
.category-btns button{
  margin:5px;
  padding:8px 16px;
  border:2px solid #87240E;
  background:transparent;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:#D6CFC4;
}

/* MASONRY */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  position:relative;
  cursor:pointer;
}

.project img{
  width:100%;
  display:block;
}

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* OVERLAY 電腦視窗 */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* 電腦視窗本體 */
#panel{
  width:85%;
  max-width:1100px;
  height:80vh;
  background:#D6CFC4;
  border-radius:10px;
  display:flex;
  overflow:hidden;
}

/* 左邊 video 區 */
#video-area{
  flex:2;
  padding:20px;
  overflow-y:auto;
  column-count:2;
  column-gap:15px;
}

/* video item */
.video-item{
  position:relative;
  margin-bottom:15px;
  cursor:pointer;
}

.video-item img{
  width:100%;
  display:block;
}

.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:#fff;
  padding:6px;
  opacity:0;
  transition:0.3s;
}

.video-item:hover .video-title{
  opacity:1;
}

/* 右邊 com 區 */
#side{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#cfc6b8;
}

#side img{
  width:260px;
  transform:scale(1.1);
}

/* PLAYER */
#player{
  width:100%;
  height:100%;
  border:none;
  display:none;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="work-computer">

<div class="category-btns">
  <button class="active" onclick="filter('design')">Design</button>
  <button onclick="filter('3d')">3D</button>
</div>

<div id="all-projects">

<!-- DESIGN -->
<div class="project" data-cat="design"><img src="design/shift.jpg"><div class="project-title">Shift</div></div>
<div class="project" data-cat="design"><img src="design/filmfestival.png"><div class="project-title">Film</div></div>
<div class="project" data-cat="design"><img src="design/communicationcamp.jpg"><div class="project-title">Camp</div></div>
<div class="project" data-cat="design"><img src="design/voiceofzhongzheng.jpg"><div class="project-title">Voice</div></div>
<div class="project" data-cat="design"><img src="design/eye.png"><div class="project-title">Eye</div></div>
<div class="project" data-cat="design"><img src="design/fb.png"><div class="project-title">FB</div></div>

<!-- 3D -->
<div class="project" data-cat="3d"><img src="d/shixian/shixian1.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian2.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian3.jpg"></div>

</div>
</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- OVERLAY 電腦 -->
<div id="overlay">

  <div id="panel">

    <!-- 左：video -->
    <div id="video-area">

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><div class="video-title">愛滋</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><div class="video-title">犯保</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><div class="video-title">與傷</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1')">
        <img src="video/narrowhouse.png"><div class="video-title">窄房</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1')">
        <img src="video/ravine.png"><div class="video-title">山溝</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1')">
        <img src="video/sony.png"><div class="video-title">Sony</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1')">
        <img src="video/camp.png"><div class="video-title">營隊</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/iD759dRtgIY?autoplay=1')">
        <img src="video/gogo.jpg"><div class="video-title">出去走走</div>
      </div>

    </div>

    <!-- 右：com -->
    <div id="side">
      <img src="good/com.webp">
    </div>

  </div>

  <!-- player -->
  <iframe id="player"></iframe>

</div>

<script>

const overlay = document.getElementById("overlay")
const player = document.getElementById("player")
const videoArea = document.getElementById("video-area")

/* 開電腦 */
document.getElementById("work-computer").onclick = () => {
  overlay.style.display = "flex"
  videoArea.style.display = "block"
  player.style.display = "none"
  player.src = ""
}

/* 開影片 */
function openVideo(url){
  videoArea.style.display = "none"
  player.style.display = "block"
  player.src = url
}

/* 點空白關閉 */
overlay.onclick = () => {
  overlay.style.display = "none"
  player.src = ""
  videoArea.style.display = "block"
}

/* 避免點 panel 關閉 */
document.getElementById("panel").onclick = (e) => {
  e.stopPropagation()
}

/* filter */
function filter(cat){
  document.querySelectorAll(".project").forEach(p=>{
    p.style.display = p.dataset.cat === cat ? "block" : "none"
  })
}

filter("design")

</script>

</body>
</html>
