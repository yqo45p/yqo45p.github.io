<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
  z-index:2;
}

.hero-images img{ height:220px; }

/* head.webm（保留） */
#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60%;
  z-index:1;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

/* ⭐ 電腦圖（右側 + 放大） */
#work-computer{
  width:340px;
  cursor:pointer;
  transition:0.3s;
  margin-left:auto;
  display:block;
  margin-right:80px;
}

#work-computer:hover{
  transform:scale(1.05);
}

/* CATEGORY */
.category-btns{
  margin:20px 0 40px;
}

.category-btns button{
  margin:5px;
  padding:6px 14px;
  border:2px solid #87240E;
  background:none;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:white;
}

/* GRID */
#work-grid{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
}

.project img{
  width:100%;
  display:block;
}

/* =========================
   ⭐ 左側直條電腦視窗
========================= */

#desktop-window{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:999;
}

/* 直條面板 */
#desktop-ui{
  position:absolute;
  left:0;
  top:0;
  width:340px;
  height:100vh;
  background:#1e1e1e;
  display:flex;
  flex-direction:column;
}

/* top bar */
#desktop-bar{
  height:40px;
  background:#333;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  color:white;
}

/* icon 列表 */
#desktop-area{
  flex:1;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
  overflow-y:auto;
}

/* icon */
.icon{
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
}

.icon img{
  width:60px;
  height:60px;
  border-radius:8px;
}

.icon p{
  color:white;
  font-size:14px;
}

/* =========================
   VIDEO OVERLAY
========================= */

#video-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#video-box{
  width:80%;
  max-width:900px;
  background:black;
}

#video-box iframe{
  width:100%;
  height:450px;
  border:none;
}

#close-video{
  color:white;
  float:right;
  padding:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- HERO（head.webm 完整保留） -->
<section id="hero">

  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>

</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<!-- ⭐ 電腦（右側） -->
<img src="good/com.webp" id="work-computer">

<div class="category-btns">
  <button onclick="filter('design')" class="active">Design</button>
  <button onclick="filter('3d')">3D</button>
</div>

<!-- ⭐ 全部 DESIGN（完整） -->
<div id="work-grid">

<div class="project" data-cat="design"><img src="design/shift.jpg"></div>
<div class="project" data-cat="design"><img src="design/filmfestival.png"></div>
<div class="project" data-cat="design"><img src="design/communicationcamp.jpg"></div>
<div class="project" data-cat="design"><img src="design/voiceofzhongzheng.jpg"></div>
<div class="project" data-cat="design"><img src="design/eye.png"></div>
<div class="project" data-cat="design"><img src="design/fb.png"></div>
<div class="project" data-cat="design"><img src="design/ghost.jpg"></div>
<div class="project" data-cat="design"><img src="design/news.png"></div>
<div class="project" data-cat="design"><img src="design/one.png"></div>
<div class="project" data-cat="design"><img src="design/temperature.png"></div>

<!-- ⭐ 全部 3D（完整） -->
<div class="project" data-cat="3d"><img src="d/shixian/shixian1.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian2.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian3.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian4.png"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian5.png"></div>

</div>
</section>

<!-- ⭐ 左側電腦視窗（VIDEO） -->
<div id="desktop-window">

  <div id="desktop-ui">

    <div id="desktop-bar">
      <span>📁 Video Projects</span>
      <span onclick="closeDesktop()" style="cursor:pointer">✕</span>
    </div>

    <div id="desktop-area">

      <div class="icon" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><p>愛滋</p>
      </div>

      <div class="icon" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><p>犯保</p>
      </div>

      <div class="icon" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><p>與傷</p>
      </div>

      <div class="icon" onclick="openVideo('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1')">
        <img src="video/narrowhouse.png"><p>窄房</p>
      </div>

      <div class="icon" onclick="openVideo('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1')">
        <img src="video/ravine.png"><p>山溝</p>
      </div>

      <div class="icon" onclick="openVideo('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1')">
        <img src="video/sony.png"><p>Sony</p>
      </div>

      <div class="icon" onclick="openVideo('https://www.peopo.org/news/822048')">
        <img src="video/wendan.jpg"><p>文旦</p>
      </div>

      <div class="icon" onclick="openVideo('https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1')">
        <img src="video/camp.png"><p>營隊</p>
      </div>

      <div class="icon" onclick="openVideo('https://www.youtube.com/embed/iD759dRtgIY?autoplay=1')">
        <img src="video/gogo.jpg"><p>出去走走</p>
      </div>

    </div>
  </div>
</div>

<!-- VIDEO PLAYER -->
<div id="video-overlay">
  <div id="video-box">
    <div id="close-video" onclick="closeVideo()">✕</div>
    <iframe id="videoFrame"></iframe>
  </div>
</div>

<script>

/* ⭐ 打開電腦視窗 */
document.getElementById("work-computer").onclick=()=>{
  document.getElementById("desktop-window").style.display="block"
}

/* ⭐ 關電腦 */
function closeDesktop(){
  document.getElementById("desktop-window").style.display="none"
}

/* ⭐ 開影片 */
function openVideo(url){
  document.getElementById("video-overlay").style.display="flex"
  document.getElementById("videoFrame").src=url
}

/* ⭐ 關影片 */
function closeVideo(){
  document.getElementById("video-overlay").style.display="none"
  document.getElementById("videoFrame").src=""
}

/* ⭐ filter */
function filter(cat){
  document.querySelectorAll("#work-grid .project").forEach(p=>{
    p.style.display = p.dataset.cat===cat ? "block":"none"
  })
}

filter("design")

</script>

</body>
</html>
