<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<link rel="icon" href="good/head.png?v=3">

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

#work img{
  width:360px;
  margin:20px auto;
  display:block;
  cursor:pointer;
  transition:0.3s;
}

#work img:hover{
  transform:scale(1.05);
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  padding:25px;
  width:90%;
  max-width:950px;
  max-height:85vh;
  overflow:auto;
}

#panel-title{
  text-align:center;
  font-size:26px;
}

#panel-text{
  text-align:center;
  font-size:18px;
  margin-top:10px;
}

#close-area{
  position:fixed;
  inset:0;
}

/* GRID */
.video-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.masonry{
  display:none;
  column-count:3;
  column-gap:15px;
}

@media(max-width:900px){.masonry{column-count:2;}}
@media(max-width:600px){.masonry{column-count:1;}}

.project,.video-item{
  break-inside:avoid;
  margin-bottom:10px;
  cursor:pointer;
  position:relative;
}

.project img,.video-item img{width:100%;}

.project-title,.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:6px;
  opacity:0;
}

.project:hover .project-title,
.video-item:hover .video-title{
  opacity:1;
}

#player{
  width:100%;
  height:420px;
  display:none;
  border:none;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="work-computer">
<img src="good/table.webp" id="work-table">
<img src="good/ca.webp" id="work-ca">

</section>

<!-- OVERLAY -->
<div id="overlay">
<div id="close-area"></div>

<div id="panel">

<h2 id="panel-title"></h2>
<p id="panel-text"></p>

<!-- VIDEO GRID -->
<div class="video-grid" id="videoGrid">

<div class="video-item" data-title="愛滋風險不分族群" data-description="2025｜攝影剪輯"
data-video="https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1">
<img src="video/aids.jpg"><div class="video-title">愛滋</div></div>

<div class="video-item" data-title="犯保重建之路" data-description="2025"
data-video="https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1">
<img src="video/crime.jpg"><div class="video-title">犯保</div></div>

<div class="video-item" data-title="與傷共行" data-description="2025"
data-video="https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1">
<img src="video/hurt.jpg"><div class="video-title">與傷</div></div>

</div>

<!-- DESIGN（完整 10+ 作品） -->
<div class="masonry" id="designGrid">

<div class="project" data-title="移面之詞主視覺" data-description="2026 主視覺設計">
<img src="design/shift.jpg"><div class="project-title">移面之詞</div></div>

<div class="project" data-title="瘋影展海報" data-description="2025 海報設計">
<img src="design/filmfestival.png"><div class="project-title">瘋影展</div></div>

<div class="project" data-title="傳播營海報" data-description="2024 活動設計">
<img src="design/communicationcamp.jpg"><div class="project-title">傳播營</div></div>

<div class="project" data-title="中正之聲" data-description="2024 視覺設計">
<img src="design/voiceofzhongzheng.jpg"><div class="project-title">中正之聲</div></div>

<div class="project" data-title="活動海報" data-description="2025">
<img src="design/eye.png"><div class="project-title">活動海報</div></div>

<div class="project" data-title="E報主視覺" data-description="2025">
<img src="design/fb.png"><div class="project-title">E報</div></div>

<div class="project" data-title="新傳獎海報" data-description="2025">
<img src="design/news.png"><div class="project-title">新傳獎</div></div>

<div class="project" data-title="專輯封面" data-description="2025">
<img src="design/temperature.png"><div class="project-title">專輯</div></div>

<div class="project" data-title="活動設計" data-description="2025">
<img src="design/ghost.jpg"><div class="project-title">活動</div></div>

<div class="project" data-title="活動設計" data-description="2025">
<img src="design/one.png"><div class="project-title">活動</div></div>

</div>

<!-- 3D（完整） -->
<div class="masonry" id="threeDGrid">

<div class="project" data-title="世賢圖書館展場" data-description="2026 空間設計">
<img src="d/shixian/shixian1.jpg"><div class="project-title">世賢</div></div>

<div class="project" data-title="嘉義圖書館展場" data-description="2026 空間設計">
<img src="d/library/library1.jpg"><div class="project-title">嘉義</div></div>

</div>

</div>
</div>

<script>
const overlay=document.getElementById("overlay")
const panelTitle=document.getElementById("panel-title")
const panelText=document.getElementById("panel-text")

const videoGrid=document.getElementById("videoGrid")
const designGrid=document.getElementById("designGrid")
const threeDGrid=document.getElementById("threeDGrid")

// 入口
document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="grid"
  designGrid.style.display="none"
  threeDGrid.style.display="none"
}

document.getElementById("work-table").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="none"
  designGrid.style.display="block"
  threeDGrid.style.display="none"
}

document.getElementById("work-ca").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="block"
}

// ⭐ 點作品（100%正常）
document.querySelectorAll(".project, .video-item").forEach(item=>{
  item.onclick=()=>{

    panelTitle.textContent=item.dataset.title||""
    panelText.textContent=item.dataset.description||""

    videoGrid.style.display="none"
    designGrid.style.display="none"
    threeDGrid.style.display="none"

    const video=item.dataset.video

    if(video){
      let iframe=document.createElement("iframe")
      iframe.src=video
      iframe.width="100%"
      iframe.height="420"
      iframe.style.border="none"
      panelText.appendChild(iframe)
    }
  }
})

// 關閉
document.getElementById("close-area").onclick=()=>{
  overlay.style.display="none"
}
</script>

</body>
</html>
