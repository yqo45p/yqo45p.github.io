<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>

@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background: linear-gradient(135deg,#D6CFC4,#FFF8F0);
    color:#87240E;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

/* 標題 */
h1{
    font-size:60px;
    font-weight: normal; /* h1 不加粗 */
    color:#87240E;
    margin:0;
}

h2{
    font-size:36px;
    color:#87240E;
    margin:0;
}

/* section */
section{
    padding:120px 20px;
    text-align:center;
}

/* navbar */
nav{
    position:fixed;
    top:20px;
    right:20px;
    display:flex;
    gap:20px;
    z-index:10;
}

nav a{
    text-decoration:none;
    color:#87240E;
    font-size:18px;
}

/* hero */
#hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* about */
#about p{
    font-size:20px;
    line-height:1.7;
    max-width:700px;
    margin:auto;
}

/* category */
.category-btns{
    margin:30px 0;
}

.category-btns button{
    background:#D6CFC4;
    color:#87240E;
    border:2px solid #87240E;
    padding:10px 20px;
    margin:0 5px;
    cursor:pointer;
    font-family:'MantouSans';
    font-size:16px;
    border-radius:4px;
    transition: all 0.3s ease;
}

.category-btns button:hover{
    background:#87240E;
    color:#D6CFC4;
}

/* masonry */
.projects{
    column-count:3;
    column-gap:20px;
    max-width:1100px;
    margin:40px auto;
    transition: opacity 0.4s ease;
}

.projects.hide{
    opacity:0;
    pointer-events:none;
}

@media (max-width:800px){
    .projects{column-count:2;}
}

.project{
    break-inside:avoid;
    margin-bottom:20px;
    cursor:pointer;
    position:relative;
    opacity:0;
    transform: translateY(20px);
    transition: all 0.5s ease;
}

.project.show{
    opacity:1;
    transform: translateY(0);
}

.project img{
    width:100%;
    display:block;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.project:hover img{
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* hover text */
.project-title{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.4);
    padding:10px;
    opacity:0;
    transition:0.3s;
    color:#FFFFFF;
}

.project:hover .project-title{
    opacity:1;
}

/* overlay */
#overlay{
    display:none;
    opacity:0;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
    z-index:999;
    transition: opacity 0.3s ease;
}

#overlay.show{
    display:flex;
    opacity:1;
}

/* panel */
#project-panel{
    background:#D6CFC4;
    color:#87240E;
    padding:30px;
    max-width:800px;
    width:90%;
    max-height:85vh;
    overflow-y:auto;
    border-radius:6px;
    text-align:center;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    transform: scale(0.8);
    transition: transform 0.3s ease;
}

#overlay.show #project-panel{
    transform: scale(1);
}

/* image */
#panel-img{
    max-width:60%;
    height:auto;
    margin-bottom:20px;
}

/* video */
#panel-video{
    width:70%;
    height:380px;
    margin-bottom:20px;
    border:none;
}

/* close */
#panel-close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:28px;
    cursor:pointer;
}

/* connect */
#connect{
    padding:60px 20px;
    text-align:center;
}

</style>
</head>

<body>

<nav>
<a href="#work">Work</a>
<a href="#about">About</a>
</nav>

<div id="overlay">
<div id="project-panel">
<span id="panel-close">✕</span>
<img id="panel-img">
<iframe id="panel-video" allow="autoplay; fullscreen"></iframe>
<h2 id="panel-title"></h2>
<p id="panel-text"></p>
</div>
</div>

<script>
const projects=document.querySelectorAll(".project")
const overlay=document.getElementById("overlay")
const panelImg=document.getElementById("panel-img")
const panelVideo=document.getElementById("panel-video")
const panelTitle=document.getElementById("panel-title")
const panelText=document.getElementById("panel-text")

// Masonry fade-in
projects.forEach((project,i)=>{
    setTimeout(()=>{project.classList.add("show")}, i*100)
})

projects.forEach(project=>{
    project.onclick=()=>{
        overlay.classList.add("show")
        const video=project.dataset.video
        if(video){
            panelImg.style.display="none"
            panelVideo.style.display="block"
            panelVideo.src=video
        } else {
            panelVideo.style.display="none"
            panelImg.style.display="block"
            panelImg.src=project.querySelector("img").src
        }
        panelTitle.textContent=project.dataset.title
        panelText.textContent=project.dataset.description
    }
})

overlay.onclick=()=>{
    overlay.classList.remove("show")
    panelVideo.src=""
}

document.getElementById("panel-close").onclick=()=>{
    overlay.classList.remove("show")
    panelVideo.src=""
}

document.getElementById("project-panel").onclick=(e)=>{
    e.stopPropagation()
}

// 分類切換動畫
const buttons=document.querySelectorAll(".category-btns button")
buttons.forEach(btn=>{
    btn.onclick=()=>{
        const cat=btn.dataset.cat
        document.querySelectorAll(".projects").forEach(p=>{
            if(p.id===cat){
                p.classList.remove("hide")
            }else{
                p.classList.add("hide")
            }
        })
    }
})
</script>

</body>
</html>
