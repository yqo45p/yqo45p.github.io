<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h2{ font-size:36px; margin:0; }

section{ padding:120px 20px; text-align:center; }

/* NAV */
nav{
    position:fixed;
    top:20px;
    right:20px;
    z-index:10;
}

nav a{
    text-decoration:none;
    color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

/* WORK COMPUTER */
#work-computer{
  display:block;
  margin:20px auto 30px;
  width:260px;
  cursor:pointer;
}

/* CATEGORY */
.category-btns{
  margin:20px 0 40px;
}

.category-btns button{
  border:2px solid #87240E;
  background:none;
  padding:8px 16px;
  margin:0 5px;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:white;
}

/* GRID */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  cursor:pointer;
  position:relative;
}

.project img{
  width:100%;
  display:block;
}

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.4);
  color:white;
  padding:8px;
  opacity:0;
}

.project:hover .project-title{
  opacity:1;
}

/* VIDEO SECTION */
#video-section{
  display:none;
  margin-top:30px;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  padding:30px;
  width:80%;
  max-width:800px;
  text-align:center;
  position:relative;
}

#panel img,
#panel iframe{
  width:100%;
  margin-bottom:20px;
}

#panel iframe{
  display:none;
  height:400px;
  border:none;
}

#close{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:24px;
}

</style>
</head>

<body>

<nav>
<a href="#work">Work</a>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<!-- ⭐ 電腦（解鎖 video） -->
<img src="good/com.webp" id="work-computer">

<!-- DESIGN / 3D 按鈕 -->
<div class="category-btns">
  <button data-cat="design" class="active">Design</button>
  <button data-cat="3d">3D</button>
</div>

<!-- ALL PROJECTS -->
<div id="all-projects">

<!-- DESIGN（全部保留） -->
<div class="project" data-cat="design" data-title="移面之詞主視覺" data-description="2026">
<img src="design/shift.jpg"><div class="project-title">移面之詞</div></div>

<div class="project" data-cat="design" data-title="瘋影展海報"><img src="design/filmfestival.png"><div class="project-title">瘋影展</div></div>

<div class="project" data-cat="design" data-title="傳播營海報"><img src="design/communicationcamp.jpg"><div class="project-title">傳播營</div></div>

<div class="project" data-cat="design" data-title="中正之聲"><img src="design/voiceofzhongzheng.jpg"><div class="project-title">中正之聲</div></div>

<div class="project" data-cat="design" data-title="活動海報"><img src="design/eye.png"><div class="project-title">活動海報</div></div>

<div class="project" data-cat="design" data-title="E報"><img src="design/fb.png"><div class="project-title">E報</div></div>

<div class="project" data-cat="design" data-title="Ghost"><img src="design/ghost.jpg"><div class="project-title">活動</div></div>

<div class="project" data-cat="design" data-title="新傳獎"><img src="design/news.png"><div class="project-title">新傳獎</div></div>

<div class="project" data-cat="design" data-title="One"><img src="design/one.png"><div class="project-title">活動</div></div>

<div class="project" data-cat="design" data-title="溫度回收"><img src="design/temperature.png"><div class="project-title">專輯</div></div>

</div>

<!-- ⭐ VIDEO（點電腦才出現） -->
<div id="video-section">

<div class="project" data-title="愛滋教育"
data-description="2025"
data-video="https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1">
<img src="video/aids.jpg"><div class="project-title">愛滋教育</div></div>

<div class="project" data-title="犯保"
data-video="https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1">
<img src="video/crime.jpg"><div class="project-title">犯保</div></div>

<div class="project" data-title="與傷"
data-video="https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1">
<img src="video/hurt.jpg"><div class="project-title">與傷</div></div>

<div class="project" data-title="窄房"
data-video="https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1">
<img src="video/narrowhouse.png"><div class="project-title">窄房</div></div>

<div class="project" data-title="山溝"
data-video="https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1">
<img src="video/ravine.png"><div class="project-title">山溝</div></div>

<div class="project" data-title="Sony"
data-video="https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1">
<img src="video/sony.png"><div class="project-title">Sony</div></div>

<div class="project" data-title="營回顧"
data-video="https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1">
<img src="video/camp.png"><div class="project-title">營回顧</div></div>

<div class="project" data-title="出去走走"
data-video="https://www.youtube.com/embed/iD759dRtgIY?autoplay=1">
<img src="video/gogo.jpg"><div class="project-title">出去走走</div></div>

</div>

</section>

<!-- CONNECT -->
<section>
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- OVERLAY -->
<div id="overlay">
<div id="panel">
<span id="close">✕</span>
<img id="img">
<iframe id="video"></iframe>
<h2 id="title"></h2>
<p id="desc"></p>
</div>
</div>

<script>

const computer=document.getElementById("work-computer")
const videoSection=document.getElementById("video-section")

// ⭐ 點電腦才顯示 VIDEO
computer.onclick=()=>{
  videoSection.style.display="block"
  videoSection.scrollIntoView({behavior:"smooth"})
}

// ⭐ CATEGORY（只控制 design / 3d）
const buttons=document.querySelectorAll(".category-btns button")
const projects=document.querySelectorAll("#all-projects .project")

function filter(cat){
  projects.forEach(p=>{
    p.style.display=p.dataset.cat===cat?"block":"none"
  })
}

buttons.forEach(btn=>{
  btn.onclick=()=>{
    buttons.forEach(b=>b.classList.remove("active"))
    btn.classList.add("active")
    filter(btn.dataset.cat)
  }
})

filter("design")

// ⭐ OVERLAY
const overlay=document.getElementById("overlay")
const img=document.getElementById("img")
const video=document.getElementById("video")
const title=document.getElementById("title")
const desc=document.getElementById("desc")

document.querySelectorAll(".project").forEach(p=>{
  p.onclick=()=>{
    overlay.style.display="flex"
    title.textContent=p.dataset.title
    desc.textContent=p.dataset.description||""

    const v=p.dataset.video

    if(v){
      img.style.display="none"
      video.style.display="block"
      video.src=v
    }else{
      video.style.display="none"
      img.style.display="block"
      img.src=p.querySelector("img").src
    }
  }
})

document.getElementById("close").onclick=()=>{
  overlay.style.display="none"
  video.src=""
}

overlay.onclick=()=>overlay.style.display="none"

</script>

</body>
</html>
