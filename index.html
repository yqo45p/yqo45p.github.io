<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* ================= HERO ================= */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* ================= WORK ================= */
#work{
  padding:140px 20px 80px;
  display:flex;
  justify-content:center;
  gap:70px;
  flex-wrap:wrap;
  text-align:center;
}

.work-item{
  cursor:pointer;
  text-align:center;
}

.work-text{
  font-size:28px;
  margin-bottom:5px;
}

.work-item img{
  width:360px;
  transition:0.3s;
}

.work-item img:hover{
  transform:scale(1.05);
}

/* ================= OVERLAY ================= */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
  padding:20px;
}

/* ================= GRID ================= */
.video-grid,
.masonry{
  display:none;
}

.video-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
  
.masonry{
  column-count:3;
  column-gap:15px;
}

/* ================= ITEM ================= */
.item{
  position:relative;
  margin-bottom:10px;
  cursor:pointer;
}

.item img{
  width:100%;
  transition:0.3s;
}

.item:hover img{
  transform:scale(1.05);
}

.title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px;
  opacity:0;
}

.item:hover .title{
  opacity:1;
}

/* ================= CONTENT ================= */
#player{
  width:100%;
  height:420px;
  display:none;
  border:none;
}

#imgViewer{
  display:block;
  max-width:100%;
  max-height:70vh;
  width:auto;
  height:auto;
  object-fit:contain;
  margin:20px auto;
}

#intro{
  display:none;
  margin-top:10px;
  line-height:1.6;
}

/* ================= CLOSE ================= */
#close-area{
  position:absolute;
  inset:0;
  background:transparent;
  z-index:1;
}

#panel{
  position:relative;
  z-index:2;
}
</style>
</head>

<script>

const overlay=document.getElementById("overlay")
const videoGrid=document.getElementById("videoGrid")
const designGrid=document.getElementById("designGrid")
const threeDGrid=document.getElementById("threeDGrid")
const player=document.getElementById("player")
const imgViewer=document.getElementById("imgViewer")
const intro=document.getElementById("intro")
const title=document.getElementById("title")

let state="home"
let current=""

/* 開列表 */
function openList(type){

  overlay.style.display="flex"
  
  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="none"

  player.style.display="none"
  player.src=""

  imgViewer.style.display="none"
  intro.style.display="none"

  current=type
  state="list"

  if(type==="VIDEO") videoGrid.style.display="grid"
  if(type==="DESIGN") designGrid.style.display="block"
  if(type==="3D") threeDGrid.style.display="block"

  title.innerText=type
}

/* 🎬 影片（點了才播放） */
function openVideo(el,url){

  state="item"

  videoGrid.style.display="none"
intro.style.display="none"
intro.innerText=""

  player.style.display="block"
  player.src=url + "?autoplay=1&mute=1"

  intro.style.display="block"
  intro.innerText=el.querySelector(".title").innerText + "｜影片作品介紹"
}

/* 🖼 圖片 */
function openImage(src,text){

  state="item"

  designGrid.style.display="none"
  threeDGrid.style.display="none"

  imgViewer.style.display="block"
  imgViewer.src=src

  intro.style.display="block"
  intro.innerText=text
}
  document.getElementById("close-area").onclick=()=>{

  if(state==="item"){

    player.style.display="none"
    imgViewer.style.display="none"
    intro.style.display="none"

    if(current==="VIDEO") videoGrid.style.display="grid"
    if(current==="DESIGN") designGrid.style.display="block"
    if(current==="3D") threeDGrid.style.display="block"

    state="list"
    return
  }

  if(state==="list"){
    overlay.style.display="none"
    state="home"
  }
}


</script>
