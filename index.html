<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

#work-computer, #work-table{
  width:360px;
  display:block;
  margin:25px auto;
  cursor:pointer;
  transition:0.3s;
}

#work-computer:hover,
#work-table:hover{
  transform:scale(1.04);
}

/* DESIGN AREA（重點：一開始不顯示） */
#design-area{
  display:none;
}

/* CATEGORY */
.category-btns button{
  margin:5px;
  padding:8px 16px;
  border:2px solid #87240E;
  background:transparent;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:#D6CFC4;
}

/* 瀑布流 */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:30px auto;
}

@media (max-width:900px){
  #all-projects{ column-count:2; }
}

@media (max-width:600px){
  #all-projects{ column-count:1; }
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  cursor:pointer;
  position:relative;
}

.project img{
  width:100%;
  display:block;
}

/* hover title */
.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.55);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  color:#87240E;
  padding:25px;
  width:90%;
  max-width:850px;
  border-radius:6px;
  position:relative;
  max-height:85vh;
  overflow-y:auto;
}

#panel-title{
  font-size:26px;
  margin-bottom:10px;
  text-align:center;
}

/* VIDEO GRID */
.video-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.video-item{
  cursor:pointer;
  position:relative;
}

.video-item img{
  width:100%;
}

.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px;
  opacity:0;
  transition:0.3s;
}

.video-item:hover .video-title{
  opacity:1;
}

/* PLAYER */
#player{
  width:100%;
  height:420px;
  border:none;
  display:none;
}

/* 點空白關閉 */
#close-area{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="work-computer">
<img src="good/table.webp" id="work-table">

<!-- DESIGN AREA（table入口才顯示） -->
<div id="design-area">

  <div class="category-btns">
    <button onclick="filter('design')" class="active">Design</button>
    <button onclick="filter('3d')">3D</button>
  </div>

  <div id="all-projects">

    <!-- DESIGN -->
    <div class="project" data-cat="design" data-title="移面之詞主視覺">
      <img src="design/shift.jpg">
      <div class="project-title">移面之詞主視覺</div>
    </div>

    <div class="project" data-cat="design" data-title="第17屆瘋影展海報">
      <img src="design/filmfestival.png">
      <div class="project-title">第17屆瘋影展海報</div>
    </div>

    <div class="project" data-cat="design" data-title="中正傳播營海報">
      <img src="design/communicationcamp.jpg">
      <div class="project-title">中正傳播營海報</div>
    </div>

    <div class="project" data-cat="design" data-title="中正之聲2024主視覺">
      <img src="design/voiceofzhongzheng.jpg">
      <div class="project-title">中正之聲2024主視覺</div>
    </div>

    <div class="project" data-cat="design" data-title="活動海報設計">
      <img src="design/eye.png">
      <div class="project-title">活動海報設計</div>
    </div>

    <div class="project" data-cat="design" data-title="中正E報主視覺">
      <img src="design/fb.png">
      <div class="project-title">中正E報主視覺</div>
    </div>

    <div class="project" data-cat="design" data-title="活動海報設計">
      <img src="design/ghost.jpg">
      <div class="project-title">活動海報設計</div>
    </div>

    <div class="project" data-cat="design" data-title="第二十三屆新傳獎海報">
      <img src="design/news.png">
      <div class="project-title">第二十三屆新傳獎海報</div>
    </div>

    <div class="project" data-cat="design" data-title="活動海報設計">
      <img src="design/one.png">
      <div class="project-title">活動海報設計</div>
    </div>

    <div class="project" data-cat="design" data-title="溫度回收計畫專輯封面">
      <img src="design/temperature.png">
      <div class="project-title">溫度回收計畫專輯封面</div>
    </div>

  </div>
</div>

</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- OVERLAY -->
<div id="overlay">
  <div id="close-area"></div>

  <div id="panel">

    <h2 id="panel-title"></h2>

    <div class="video-grid" id="videoGrid">

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><div class="video-title">愛滋</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><div class="video-title">犯保</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><div class="video-title">與傷</div>
      </div>

    </div>

    <iframe id="player"></iframe>

  </div>
</div>

<script>

const overlay = document.getElementById("overlay")
const closeArea = document.getElementById("close-area")
const videoGrid = document.getElementById("videoGrid")
const player = document.getElementById("player")
const panelTitle = document.getElementById("panel-title")

const workComputer = document.getElementById("work-computer")
const workTable = document.getElementById("work-table")
const designArea = document.getElementById("design-area")

const projects = document.querySelectorAll(".project")

// VIDEO入口
workComputer.onclick = () => {
  overlay.style.display = "flex"
  videoGrid.style.display = "grid"
  player.style.display = "none"
  player.src = ""
  panelTitle.textContent = "Video"
}

// DESIGN入口（關鍵）
workTable.onclick = () => {
  overlay.style.display = "none"
  videoGrid.style.display = "none"
  player.style.display = "none"

  designArea.style.display = "block"
  panelTitle.textContent = "Design"
}

// 開影片
function openVideo(url){
  videoGrid.style.display = "none"
  player.style.display = "block"
  player.src = url
}

// 關閉
closeArea.onclick = () => {
  overlay.style.display = "none"
  player.src = ""
  player.style.display = "none"
  videoGrid.style.display = "grid"
}

// 點作品
projects.forEach(p=>{
  p.onclick = () => {
    overlay.style.display = "flex"
    videoGrid.style.display = "none"
    player.style.display = "none"
    panelTitle.textContent = p.dataset.title
  }
})

// filter
function filter(cat){
  document.querySelectorAll(".project").forEach(p=>{
    p.style.display = (p.dataset.cat === cat) ? "block" : "none"
  })
}

</script>

</body>
</html>
