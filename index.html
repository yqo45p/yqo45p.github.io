<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{
  height:220px;
}

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

/* 電腦（微放大） */
#work-computer{
  width:300px;
  display:block;
  margin:30px auto;
  cursor:pointer;
  transition:0.3s;
}

#work-computer:hover{
  transform:scale(1.03);
}

/* CATEGORY */
.category-btns button{
  margin:5px;
  padding:8px 16px;
  border:2px solid #87240E;
  background:transparent;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:#D6CFC4;
}

/* GRID */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  cursor:pointer;
  position:relative;
}

.project img{
  width:100%;
  display:block;
}

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  width:90%;
  max-width:1100px;
  height:85vh;
  display:flex;
  padding:20px;
  gap:20px;
}

/* VIDEO LIST */
#videoList{
  width:40%;
  overflow-y:auto;
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.video-item{
  position:relative;
  cursor:pointer;
}

.video-item img{
  width:100%;
  display:block;
}

.video-item span{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px;
  opacity:0;
  font-size:14px;
}

.video-item:hover span{
  opacity:1;
}

/* PLAYER */
#playerBox{
  width:60%;
  display:flex;
  flex-direction:column;
}

#player{
  width:100%;
  height:420px;
  border:none;
}

#desc{
  margin-top:10px;
  font-size:18px;
}

</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<!-- 電腦入口 -->
<img src="good/com.webp" id="work-computer">

<div class="category-btns">
  <button class="active" onclick="filter('design')">Design</button>
  <button onclick="filter('3d')">3D</button>
</div>

<div id="all-projects">

<!-- DESIGN（完整保留） -->
<div class="project" data-cat="design"><img src="design/shift.jpg"></div>
<div class="project" data-cat="design"><img src="design/filmfestival.png"></div>
<div class="project" data-cat="design"><img src="design/communicationcamp.jpg"></div>
<div class="project" data-cat="design"><img src="design/voiceofzhongzheng.jpg"></div>
<div class="project" data-cat="design"><img src="design/eye.png"></div>
<div class="project" data-cat="design"><img src="design/fb.png"></div>
<div class="project" data-cat="design"><img src="design/ghost.jpg"></div>
<div class="project" data-cat="design"><img src="design/news.png"></div>
<div class="project" data-cat="design"><img src="design/one.png"></div>
<div class="project" data-cat="design"><img src="design/temperature.png"></div>

<!-- 3D -->
<div class="project" data-cat="3d"><img src="d/shixian/shixian1.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian2.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian3.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian4.png"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian5.png"></div>

</div>
</section>

<!-- OVERLAY -->
<div id="overlay">
  <div id="panel">

    <!-- VIDEO LIST（完整9支影片＋介紹） -->
    <div id="videoList">

      <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1','從污名到教育')">
        <img src="video/aids.jpg"><span>從污名到教育</span>
      </div>

      <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1','創傷到馨生')">
        <img src="video/crime.jpg"><span>創傷到馨生</span>
      </div>

      <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1','與傷共行')">
        <img src="video/hurt.jpg"><span>與傷共行</span>
      </div>

      <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1','窄房')">
        <img src="video/narrowhouse.png"><span>窄房</span>
      </div>

      <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1','山溝')">
        <img src="video/ravine.png"><span>山溝</span>
      </div>

      <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1','Sony')">
        <img src="video/sony.png"><span>Sony</span>
      </div>

      <div class="video-item" onclick="playVideo('https://www.peopo.org/news/822048','文旦')">
        <img src="video/wendan.jpg"><span>文旦</span>
      </div>

      <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1','營隊')">
        <img src="video/camp.png"><span>營隊</span>
      </div>

      <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/iD759dRtgIY?autoplay=1','出去走走')">
        <img src="video/gogo.jpg"><span>出去走走</span>
      </div>

    </div>

    <!-- PLAYER -->
    <div id="playerBox">
      <iframe id="player"></iframe>
      <div id="desc"></div>
    </div>

  </div>
</div>

<script>

const overlay = document.getElementById("overlay")
const player = document.getElementById("player")
const desc = document.getElementById("desc")

// 開電腦
document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"
}

// 播影片 + 自動播放
function playVideo(url,title){
  player.src = url
  desc.textContent = title
}

// 點空白關閉
overlay.onclick=()=>{
  overlay.style.display="none"
  player.src=""
  desc.textContent=""
}

// 防止點 panel 也關閉
document.getElementById("panel").onclick=(e)=>e.stopPropagation()

// filter
function filter(cat){
  document.querySelectorAll(".project").forEach(p=>{
    p.style.display = p.dataset.cat===cat ? "block":"none"
  })
}

filter("design")

</script>

</body>
</html>
