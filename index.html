<style>
@font-face{
    font-family:'MantouSans';

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h1{ font-size:60px; font-weight: normal; color:#87240E; margin:0; }
h2{ font-size:36px; color:#87240E; margin:0; }

section{ padding:120px 20px; text-align:center; }

/* navbar */
nav{ position:fixed; top:20px; right:20px; display:flex; gap:20px; z-index:10; }
nav a{ text-decoration:none; color:#87240E; font-size:18px; }

/* hero */
#hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.hero-images {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 25px;
  z-index: 3;
}

.hero-images img { height: 220px; }

#hero video {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 50%;
  height: 50%;
  object-fit: cover;
  z-index: 1;
}

/* buttons */
.category-btns{
    margin:30px 0;
}

.category-btns button{
    background:#D6CFC4;
    color:#87240E;
    border:2px solid #87240E;
    padding:10px 20px;
    margin:0 5px;
    cursor:pointer;
    font-family:'MantouSans';
    font-size:16px;
    border-radius:4px;
    transition:0.3s;
}

.category-btns button.active{
    background:#87240E;
    color:#D6CFC4;
}

/* masonry */
#all-projects{
    column-count:3;
    column-gap:20px;
    max-width:1100px;
    margin:40px auto;
}

@media (max-width:800px){
  #all-projects{ column-count:2; }
}

.project{
    break-inside:avoid;
    margin-bottom:20px;
    cursor:pointer;
    position:relative;
}

.project img{ width:100%; display:block; }

/* hover */
.project-title{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.4);
    padding:10px;
    opacity:0;
    transition:0.3s;
    color:#FFFFFF;
}

.project:hover .project-title{ opacity:1; }

/* ⭐ VIDEO 電腦入口 */
.video-hub img{
    object-fit:contain;
    background:#D6CFC4;
}

/* overlay */
#overlay{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
    z-index:999;
}

#project-panel{
    background:#D6CFC4;
    color:#87240E;
    padding:30px;
    max-width:800px;
    width:90%;
    max-height:85vh;
    overflow-y:auto;
    border-radius:6px;
    text-align:center;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
}

#panel-img{
    max-width:60%;
    height:auto;
    margin-bottom:20px;
}

#panel-video{
    width:70%;
    height:380px;
    margin-bottom:20px;
    border:none;
    display:none;
}

#panel-close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:28px;
    cursor:pointer;
}

#panel-title{
    font-weight: normal;
    font-size:28px;
    margin-bottom:15px;
}

#panel-text{
    font-size:19px;
    line-height:1.6;
}

#panel-extra-images{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

#connect{
    padding:60px 20px;
    text-align:center;
}
</style>

<script>
const projects=document.querySelectorAll(".project")
const overlay=document.getElementById("overlay")
const panelImg=document.getElementById("panel-img")
const panelVideo=document.getElementById("panel-video")
const panelTitle=document.getElementById("panel-title")
const panelText=document.getElementById("panel-text")
const panelExtra=document.getElementById("panel-extra-images")

const buttons=document.querySelectorAll(".category-btns button")

// 點作品
projects.forEach(p=>{
  p.onclick=()=>{

    // ⭐ 電腦入口 → 切 video
    if(p.classList.contains("video-hub")){
      buttons.forEach(b=>b.classList.remove("active"))
      document.querySelector('[data-cat="video"]').classList.add("active")

      projects.forEach(item=>{
        if(item.classList.contains("video-hub")){
          item.style.display="block"
        }else{
          item.style.display = (item.dataset.cat==="video") ? "block" : "none"
        }
      })

      document.getElementById("work").scrollIntoView({behavior:"smooth"})
      return
    }

    overlay.style.display="flex"
    panelTitle.textContent=p.dataset.title
    panelText.textContent=p.dataset.description
    panelExtra.innerHTML=""

    if(p.dataset.video){
      panelImg.style.display="none"
      panelVideo.style.display="block"
      panelVideo.src=p.dataset.video
    }else{
      panelVideo.style.display="none"
      panelImg.style.display="block"
      panelImg.src=p.querySelector("img").src
    }

    if(p.dataset.images){
      p.dataset.images.split(",").forEach(src=>{
        const img=document.createElement("img")
        img.src=src
        img.style.width="45%"
        panelExtra.appendChild(img)
      })
    }
  }
})

// 關閉
function closePanel(){
  overlay.style.display="none"
  panelVideo.src=""
}

overlay.onclick=closePanel
document.getElementById("panel-close").onclick=closePanel

// filter
function filter(cat){
  projects.forEach(p=>{
    if(p.classList.contains("video-hub")){
      p.style.display="block"
    }else{
      p.style.display = (p.dataset.cat===cat) ? "block" : "none"
    }
  })
}

buttons.forEach(btn=>{
  btn.onclick=()=>{
    buttons.forEach(b=>b.classList.remove("active"))
    btn.classList.add("active")
    filter(btn.dataset.cat)
  }
})

// default
filter("video")
</script>
