<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{
  height:220px;
}

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

/* ⭐ 電腦圖（置中＋放大） */
#work-computer{
  width:440px;
  display:block;
  margin:30px auto 20px;
  cursor:pointer;
  transition:0.3s;
}

#work-computer:hover{
  transform:scale(1.05);
}

/* CATEGORY */
.category-btns button{
  margin:5px;
  padding:8px 16px;
  border:2px solid #87240E;
  background:transparent;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:#D6CFC4;
}

/* GRID */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  cursor:pointer;
}

.project img{
  width:100%;
  display:block;
}

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  color:#87240E;
  padding:30px;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow-y:auto;
  border-radius:6px;
  position:relative;
}

#close{
  position:absolute;
  right:15px;
  top:10px;
  cursor:pointer;
  font-size:24px;
}

/* VIDEO GRID */
.video-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.video-item{
  position:relative;
  cursor:pointer;
}

.video-item img{
  width:100%;
}

.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.video-item:hover .video-title{
  opacity:1;
}

/* PLAYER */
#player{
  width:100%;
  height:420px;
  border:none;
  display:none;
}

</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<!-- ⭐ 電腦入口 -->
<img src="good/com.webp" id="work-computer">

<div class="category-btns">
  <button onclick="filter('design')" class="active">Design</button>
  <button onclick="filter('3d')">3D</button>
</div>

<!-- DESIGN + 3D -->
<div id="all-projects">

<!-- DESIGN -->
<div class="project" data-cat="design"><img src="design/shift.jpg"></div>
<div class="project" data-cat="design"><img src="design/filmfestival.png"></div>
<div class="project" data-cat="design"><img src="design/communicationcamp.jpg"></div>
<div class="project" data-cat="design"><img src="design/voiceofzhongzheng.jpg"></div>
<div class="project" data-cat="design"><img src="design/eye.png"></div>
<div class="project" data-cat="design"><img src="design/fb.png"></div>
<div class="project" data-cat="design"><img src="design/ghost.jpg"></div>
<div class="project" data-cat="design"><img src="design/news.png"></div>
<div class="project" data-cat="design"><img src="design/one.png"></div>
<div class="project" data-cat="design"><img src="design/temperature.png"></div>

<!-- 3D -->
<div class="project" data-cat="3d"><img src="d/shixian/shixian1.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian2.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian3.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian4.png"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian5.png"></div>

</div>
</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- OVERLAY -->
<div id="overlay">
  <div id="panel">

    <div id="close">✕</div>

    <!-- VIDEO GRID -->
    <div class="video-grid" id="videoGrid">

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><div class="video-title">愛滋</div>
      </div>

      <div class="video-item" onclick="openVideo('_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><div class="video-title">犯保</div>
      </div>

      <div class="video-item" onclick="openVideo('DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><div class="video-title">與傷</div>
      </div>

      <div class="video-item" onclick="openVideo('ODA4hvMLTbk?autoplay=1')">
        <img src="video/narrowhouse.png"><div class="video-title">窄房</div>
      </div>

      <div class="video-item" onclick="openVideo('ANlh-9-dZR8?autoplay=1')">
        <img src="video/ravine.png"><div class="video-title">山溝</div>
      </div>

      <div class="video-item" onclick="openVideo('YSA-ws8PeJo?autoplay=1')">
        <img src="video/sony.png"><div class="video-title">Sony</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.peopo.org/news/822048')">
        <img src="video/wendan.jpg"><div class="video-title">文旦</div>
      </div>

      <div class="video-item" onclick="openVideo('k5CRxQ0rPTc?autoplay=1')">
        <img src="video/camp.png"><div class="video-title">營隊</div>
      </div>

      <div class="video-item" onclick="openVideo('iD759dRtgIY?autoplay=1')">
        <img src="video/gogo.jpg"><div class="video-title">出去走走</div>
      </div>

    </div>

    <!-- PLAYER -->
    <iframe id="player"></iframe>

  </div>
</div>

<script>

const overlay=document.getElementById("overlay")
const player=document.getElementById("player")
const videoGrid=document.getElementById("videoGrid")

/* ⭐ 打開電腦 */
document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="grid"
  player.style.display="none"
  player.src=""
}

/* ⭐ 開影片 */
function openVideo(url){
  videoGrid.style.display="none"
  player.style.display="block"
  player.src=url
}

/* ⭐ 關閉回影片清單 */
document.getElementById("close").onclick=()=>{
  player.style.display="none"
  player.src=""
  videoGrid.style.display="grid"
}

/* ⭐ filter */
function filter(cat){
  document.querySelectorAll(".project").forEach(p=>{
    p.style.display=p.dataset.cat===cat?"block":"none"
  })
}

filter("design")

</script>

</body>
</html>
