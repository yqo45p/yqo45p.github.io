<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Dela Gothic One',sans-serif;
  background:#FFFFFF;
  color:#8C3A3A;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

h1,h2,h3{
  color:#8C3A3A;
  margin:0;
}

h1{ font-size:60px; }
h2{ font-size:36px; }

/* About 文字稍大 */
#about p{
  font-size:18px;
  line-height:1.6;
}

section{
  padding:120px 20px;
  text-align:center;
}

/* 上方右上導覽列 */
nav{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:20px;
  z-index:10;
}

nav a{
  text-decoration:none;
  color:#8C3A3A;
  font-size:18px;
}

/* hero */
#hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#hero h1{
  margin-bottom:10px;
}

/* 分類按鈕 */
.category-btns{
  margin:30px 0;
}

.category-btns button{
  background:#FFFFFF;
  color:#8C3A3A;
  border:2px solid #8C3A3A;
  padding:10px 20px;
  margin:0 5px;
  cursor:pointer;
  font-family:'Dela Gothic One',sans-serif;
  font-size:16px;
  border-radius:4px;
  transition:0.3s;
}

.category-btns button:hover{
  opacity:0.8;
}

/* masonry layout */
.projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:40px auto;
  display:block; /* 一開始全部顯示 */
}

@media (max-width:800px){
  .projects{
    column-count:2;
  }
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  border:none;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

.project:hover{
  transform:scale(1.03);
}

.project img{
  width:100%;
  height:auto;
  display:block;
}

/* hover title */
.project-title{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.4);
  padding:10px;
  opacity:0;
  transition:0.3s;
  color:#FFFFFF; /* hover文字白色 */
}

.project:hover .project-title{
  opacity:1;
}

/* project panel - 居中且背景偏暗 */
#overlay{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#project-panel{
  background:#FFFFFF;
  color:#8C3A3A;
  padding:20px;
  max-width:700px;
  width:90%;
  max-height:90%;
  overflow:auto;
  position:relative;
  border-radius:6px;
  text-align:center;
}

#panel-img, #panel-video{
  width:auto;
  max-width:80%;
  height:auto;
  max-height:60vh; /* 限制高度，保持比例 */
  margin-bottom:20px;
}

#panel-close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:30px;
  cursor:pointer;
}

/* Connect 最底部 */
#connect{
  padding:60px 20px;
  background:#FFFFFF;
  color:#8C3A3A;
  text-align:center;
}
</style>
</head>

<body>

<nav>
<a href="#work">Work</a>
<a href="#about">About</a>
</nav>

<section id="hero">
<h1>曾珮甄作品集</h1>
<p>Design / Video / 3D Modeling</p>
</section>

<section id="work">
<h2>Work</h2>

<div class="category-btns">
<button data-cat="design">Design</button>
<button data-cat="video">Video</button>
<button data-cat="3d">3D Modeling</button>
</div>

<!-- Design -->
<div class="projects" id="design">
<div class="project" data-title="移面之詞主視覺" data-description="SHIFT 視覺設計專案，透過幾何構圖與色彩呈現動態轉變。">
<img src="design/shift.jpg">
<div class="project-title">移面之詞主視覺</div>
</div>
<div class="project" data-title="第17屆瘋影展海報" data-description="Film Festival 海報設計。">
<img src="design/filmfestival.png">
<div class="project-title">第17屆瘋影展海報</div>
</div>
<div class="project" data-title="中正傳播營海報" data-description="Communication Camp 視覺設計。">
<img src="design/communicationcamp.jpg">
<div class="project-title">中正傳播營海報</div>
</div>
<div class="project" data-title="中正之聲2024主視覺" data-description="Voice of Zhongzheng 視覺專案。">
<img src="design/voiceofzhongzheng.jpg">
<div class="project-title">中正之聲2024主視覺</div>
</div>
</div>

<!-- Video -->
<div class="projects" id="video">
<div class="project" data-title="劇情片｜剪輯" data-description="Ravine、場記" data-video="https://www.youtube.com/embed/ANlh-9-dZR8?si=zwyEOQ5nlduVLKED">
<img src="editing/ravine.png">
<div class="project-title">劇情片｜剪輯</div>
</div>
<div class="project" data-title="廣告｜導演" data-description="Sony" data-video="https://www.youtube.com/embed/YSA-ws8PeJo">
<img src="editing/sony.png">
<div class="project-title">廣告｜導演</div>
</div>
<div class="project" data-title="新聞｜拍攝、剪輯" data-description="Wendan" data-video="https://www.peopo.org/video/822058/embed">
<img src="editing/wendan.jpg">
<div class="project-title">新聞｜拍攝、剪輯</div>
</div>
</div>

<!-- 3D Modeling -->
<div class="projects" id="3d">
<div class="project" data-title="3D Project 1" data-description="3D 建模作品。">
<img src="3d/model1.jpg">
<div class="project-title">3D Project 1</div>
</div>
<div class="project" data-title="3D Project 2" data-description="3D 建模作品。">
<img src="3d/model2.jpg">
<div class="project-title">3D Project 2</div>
</div>
</div>

</section>

<!-- About 放在 Work 後 -->
<section id="about">
<h2>About</h2>
<p>
我是曾珮甄，目前就讀中正大學傳播系三年級，會剪輯、設計及3D建模。<br>
我想做的，是把我會的技能融合起來，做出有意思、有力量的作品。<br>
同時，我也保持學習新技術和挑戰不同媒介的熱情。
</p>
</section>

<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- overlay panel -->
<div id="overlay">
<div id="project-panel">
<span id="panel-close">✕</span>
<img id="panel-img">
<iframe id="panel-video" width="100%" height="315" frameborder="0" allowfullscreen style="display:none;"></iframe>
<h2 id="panel-title"></h2>
<p id="panel-text"></p>
</div>
</div>

<script>
// project panel
const projects = document.querySelectorAll(".project")
const overlay = document.getElementById("overlay")
const panel = document.getElementById("project-panel")
const panelImg = document.getElementById("panel-img")
const panelVideo = document.getElementById("panel-video")
const panelTitle = document.getElementById("panel-title")
const panelText = document.getElementById("panel-text")

projects.forEach(project=>{
  project.addEventListener("click",(e)=>{
    e.stopPropagation()
    overlay.style.display="flex"
    const videoUrl = project.dataset.video
    if(videoUrl){
      panelImg.style.display="none"
      panelVideo.style.display="block"
      panelVideo.src = videoUrl
    } else {
      panelVideo.style.display="none"
      panelImg.style.display="block"
      panelImg.src=project.querySelector("img").src
    }
    panelTitle.textContent=project.dataset.title
    panelText.textContent=project.dataset.description
  })
})

// 點擊叉叉或 overlay 任意空白處關閉 panel
function closePanel(){
  overlay.style.display="none"
  panelVideo.src=""
}

document.getElementById("panel-close").onclick=closePanel
overlay.addEventListener('click',closePanel)
panel.addEventListener('click',e=>e.stopPropagation())

// 分類按鈕切換
const buttons = document.querySelectorAll('.category-btns button');
buttons.forEach(btn=>{
  btn.addEventListener('click',()=>{
    const cat = btn.dataset.cat;
    document.querySelectorAll('.projects').forEach(p=>{
      if(p.id===cat){
        p.style.display='block';
      } else {
        p.style.display='none';
      }
    });
  })
});
</script>
</body>
</html>
