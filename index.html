<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<link rel="icon" href="good/head.png?v=3">

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

#work img{
  width:360px;
  display:block;
  margin:25px auto;
  cursor:pointer;
  transition:0.3s;
}

#work img:hover{
  transform:scale(1.04);
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  padding:25px;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
}

#panel-title{
  text-align:center;
}

/* GRID */
.video-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.masonry{
  display:none;
  column-count:3;
  column-gap:15px;
}

@media (max-width:900px){
  .masonry{ column-count:2; }
}
@media (max-width:600px){
  .masonry{ column-count:1; }
}

.project,.video-item{
  break-inside:avoid;
  margin-bottom:10px;
  cursor:pointer;
  position:relative;
}

.project img,.video-item img{
  width:100%;
}

.project-title,.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:6px;
  opacity:0;
}

.project:hover .project-title,
.video-item:hover .video-title{
  opacity:1;
}

#player{
  width:100%;
  height:420px;
  display:none;
  border:none;
}

#close-area{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">
<h2>Work</h2>

<img src="good/com.webp" id="work-computer">
<img src="good/table.webp" id="work-table">
<img src="good/ca.webp" id="work-ca">

</section>

<!-- OVERLAY -->
<div id="overlay">
<div id="close-area"></div>

<div id="panel">
<h2 id="panel-title"></h2>

<!-- VIDEO -->
<div class="video-grid" id="videoGrid">

<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')"><img src="video/aids.jpg"><div class="video-title">從污名到教育—愛滋風險不分族群</div></div>
<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')"><img src="video/crime.jpg"><div class="video-title">創傷到馨生—犯保協會的重建之路</div></div>
<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')"><img src="video/hurt.jpg"><div class="video-title">與傷共行—那些尚未說完的事</div></div>
<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1')"><img src="video/narrowhouse.png"><div class="video-title">窄房</div></div>
<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1')"><img src="video/ravine.png"><div class="video-title">山溝</div></div>
<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1')"><img src="video/sony.png"><div class="video-title">Sony收你的創意-影視製作工作坊</div></div>
<div class="video-item" onclick="openVideo('https://www.peopo.org/news/822048')"><img src="video/wendan.jpg"><div class="video-title">滿園文旦成廢果 農民收成化泡影？</div></div>
<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1')"><img src="video/camp.png"><div class="video-title">中正傳播營回顧片</div></div>
<div class="video-item" onclick="openVideo('https://www.youtube.com/embed/iD759dRtgIY?autoplay=1')"><img src="video/gogo.jpg"><div class="video-title">出去走走｜劇情短片</div></div>

</div>

<!-- DESIGN -->
<div class="masonry" id="designGrid">

<div class="project"><img src="design/shift.jpg"><div class="project-title">移面之詞主視覺</div></div>
<div class="project"><img src="design/filmfestival.png"><div class="project-title">第17屆瘋影展海報</div></div>
<div class="project"><img src="design/communicationcamp.jpg"><div class="project-title">中正傳播營海報</div></div>
<div class="project"><img src="design/voiceofzhongzheng.jpg"><div class="project-title">中正之聲2024主視覺</div></div>
<div class="project"><img src="design/eye.png"><div class="project-title">活動海報設計</div></div>
<div class="project"><img src="design/fb.png"><div class="project-title">中正E報主視覺</div></div>
<div class="project"><img src="design/ghost.jpg"><div class="project-title">活動海報設計</div></div>
<div class="project"><img src="design/news.png"><div class="project-title">第二十三屆新傳獎海報</div></div>
<div class="project"><img src="design/one.png"><div class="project-title">活動海報設計</div></div>
<div class="project"><img src="design/temperature.png"><div class="project-title">《溫度回收計畫》專輯封面</div></div>

</div>

<!-- 3D -->
<div class="masonry" id="threeDGrid">

<div class="project"><img src="d/shixian/shixian1.jpg"><div class="project-title">世賢圖書館展場空間規劃</div></div>
<div class="project"><img src="d/library/library1.jpg"><div class="project-title">嘉義市圖書館展場規劃</div></div>

</div>

<iframe id="player"></iframe>

</div>
</div>

<script>
const overlay = document.getElementById("overlay")
const videoGrid = document.getElementById("videoGrid")
const designGrid = document.getElementById("designGrid")
const threeDGrid = document.getElementById("threeDGrid")
const player = document.getElementById("player")
const panelTitle = document.getElementById("panel-title")

document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="grid"
  designGrid.style.display="none"
  threeDGrid.style.display="none"
  player.style.display="none"
  player.src=""
  panelTitle.textContent="Video"
}

document.getElementById("work-table").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="none"
  designGrid.style.display="block"
  threeDGrid.style.display="none"
  player.style.display="none"
  panelTitle.textContent="Design"
}

document.getElementById("work-ca").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="block"
  player.style.display="none"
  panelTitle.textContent="3D"
}

function openVideo(url){
  videoGrid.style.display="none"
  player.style.display="block"
  player.src=url
}

document.getElementById("close-area").onclick=()=>{
  overlay.style.display="none"
  player.src=""
}
</script>

</body>
</html>
