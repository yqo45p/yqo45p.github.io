<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* WORK */
#work{
  display:flex;
  justify-content:center;
  gap:70px;
  padding:120px 20px;
  text-align:center;
}

.work-item img{
  width:320px;
  cursor:pointer;
}

.work-text{
  font-size:24px;
  margin-bottom:6px;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* PANEL */
#panel{
  background:#D6CFC4;
  width:90%;
  max-width:900px;
  padding:20px;
  position:relative;
}

/* GRIDS */
.video-grid,.masonry{
  display:none;
}

.video-grid{
  grid-template-columns:repeat(3,1fr);
}

.masonry{
  column-count:3;
}

.video-item,.project{
  cursor:pointer;
  margin-bottom:10px;
}

.video-item img,.project img{
  width:100%;
}

/* VIEWERS */
#player{
  width:100%;
  height:420px;
  display:none;
  border:none;
}

#imgViewer{
  width:100%;
  display:none;
}

/* 點空白 */
#close-area{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<!-- WORK -->
<section id="work">

<div class="work-item" id="btnVideo">
  <div class="work-text">VIDEO</div>
  <img src="good/ca.webp">
</div>

<div class="work-item" id="btnDesign">
  <div class="work-text">DESIGN</div>
  <img src="good/table.webp">
</div>

<div class="work-item" id="btn3D">
  <div class="work-text">3D</div>
  <img src="good/com.webp">
</div>

</section>

<!-- OVERLAY -->
<div id="overlay">
<div id="close-area"></div>

<div id="panel">

<!-- VIDEO -->
<div class="video-grid" id="videoGrid">
  <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s')">
    <img src="video/aids.jpg">
  </div>

  <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q')">
    <img src="video/crime.jpg">
  </div>
</div>

<!-- DESIGN -->
<div class="masonry" id="designGrid">

  <div class="project" onclick="openImage('design/shift.jpg')">
    <img src="design/shift.jpg">
  </div>

  <div class="project" onclick="openImage('design/filmfestival.png')">
    <img src="design/filmfestival.png">
  </div>

</div>

<!-- 3D -->
<div class="masonry" id="threeDGrid">

  <div class="project" onclick="openImage('d/shixian/shixian1.jpg')">
    <img src="d/shixian/shixian1.jpg">
  </div>

  <div class="project" onclick="openImage('d/library/library1.jpg')">
    <img src="d/library/library1.jpg">
  </div>

</div>

<iframe id="player" allow="autoplay"></iframe>
<img id="imgViewer">

</div>
</div>

<script>

const overlay=document.getElementById("overlay")
const videoGrid=document.getElementById("videoGrid")
const designGrid=document.getElementById("designGrid")
const threeDGrid=document.getElementById("threeDGrid")
const player=document.getElementById("player")
const imgViewer=document.getElementById("imgViewer")

let state="home"
let current=""

/* 開分類 */
function openList(type){
  overlay.style.display="flex"

  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="none"

  player.style.display="none"
  imgViewer.style.display="none"

  if(type==="video") videoGrid.style.display="grid"
  if(type==="design") designGrid.style.display="block"
  if(type==="3d") threeDGrid.style.display="block"

  state="list"
}

document.getElementById("btnVideo").onclick=()=>openList("video")
document.getElementById("btnDesign").onclick=()=>openList("design")
document.getElementById("btn3D").onclick=()=>openList("3d")

/* 開影片 */
function openVideo(url){
  overlay.style.display="flex"

  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="none"

  imgViewer.style.display="none"
  player.style.display="block"

  player.src=url+"?autoplay=1&mute=1"

  state="item"
  current="video"
}

/* 開圖片 */
function openImage(src){
  overlay.style.display="flex"

  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="none"

  player.style.display="none"
  imgViewer.style.display="block"

  imgViewer.src=src

  state="item"
  current="image"
}

/* 點空白（關鍵） */
document.getElementById("close-area").onclick=()=>{

  // 作品 → 回列表
  if(state==="item"){
    player.style.display="none"
    imgViewer.style.display="none"

    if(current==="video") videoGrid.style.display="grid"
    if(current==="image") designGrid.style.display="block"

    state="list"
    return
  }

  // 列表 → 回主頁
  if(state==="list"){
    overlay.style.display="none"
    player.src=""
    state="home"
    return
  }
}

</script>

</body>
</html>
