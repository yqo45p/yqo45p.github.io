<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>作品集</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* ===== 主頁動畫 ===== */
#work{
  display:flex;
  justify-content:center;
  gap:60px;
  padding:120px 20px;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.work-item{
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.work-item img{
  width:300px;
  transition:0.3s;
  border-radius:10px;
}

.work-item:hover img{
  transform:scale(1.08);
  filter:brightness(1.1);
}

/* ===== overlay ===== */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  justify-content:center;
  align-items:center;
}

/* ===== panel ===== */
#panel{
  width:90%;
  max-width:950px;
  background:#D6CFC4;
  padding:20px;
  max-height:85vh;
  overflow:auto;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.9); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

/* ===== grid ===== */
.grid{
  display:none;
  gap:10px;
}

.video-grid{
  grid-template-columns:repeat(3,1fr);
}

.masonry{
  column-count:3;
  column-gap:10px;
}

/* ===== 作品動畫 ===== */
.item{
  position:relative;
  margin-bottom:10px;
  cursor:pointer;
  overflow:hidden;
  animation:imgFade 0.4s ease;
}

@keyframes imgFade{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

.item img{
  width:100%;
  transition:0.3s;
}

.item:hover img{
  transform:scale(1.05);
  filter:brightness(1.1);
}

/* title */
.title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px;
  opacity:0;
  transition:0.3s;
}

.item:hover .title{
  opacity:1;
}

/* ===== 內容 ===== */
#player{
  width:100%;
  height:420px;
  display:none;
  animation:fadeIn 0.3s;
}

#imgViewer{
  width:100%;
  display:none;
  animation:fadeIn 0.3s;
}

#intro{
  display:none;
  margin-top:10px;
  line-height:1.6;
}

/* click area */
#close-area{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<!-- 主頁 -->
<section id="work">

<div class="work-item" onclick="openList('VIDEO')">
<img src="good/ca.webp">
<p>VIDEO</p>
</div>

<div class="work-item" onclick="openList('DESIGN')">
<img src="good/table.webp">
<p>DESIGN</p>
</div>

<div class="work-item" onclick="openList('3D')">
<img src="good/com.webp">
<p>3D</p>
</div>

</section>

<!-- overlay -->
<div id="overlay">
<div id="close-area"></div>

<div id="panel">

<h2 id="title"></h2>

<!-- VIDEO -->
<div id="videoGrid" class="grid video-grid">

<div class="item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s')">
<img src="video/aids.jpg">
<div class="title">愛滋紀錄</div>
</div>

<div class="item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q')">
<img src="video/crime.jpg">
<div class="title">創傷修復</div>
</div>

<div class="item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY')">
<img src="video/hurt.jpg">
<div class="title">與傷共行</div>
</div>

</div>

<!-- DESIGN -->
<div id="designGrid" class="grid masonry">

<div class="item" onclick="openImage('design/shift.jpg')">
<img src="design/shift.jpg">
<div class="title">移面之詞</div>
</div>

<div class="item" onclick="openImage('design/filmfestival.png')">
<img src="design/filmfestival.png">
<div class="title">影展海報</div>
</div>

</div>

<!-- 3D -->
<div id="threeDGrid" class="grid masonry">

<div class="item" onclick="openImage('d/shixian/shixian1.jpg')">
<img src="d/shixian/shixian1.jpg">
<div class="title">展場設計</div>
</div>

</div>

<!-- content -->
<iframe id="player"></iframe>
<img id="imgViewer">
<div id="intro"></div>

</div>
</div>

<script>
const overlay=document.getElementById("overlay")
const videoGrid=document.getElementById("videoGrid")
const designGrid=document.getElementById("designGrid")
const threeDGrid=document.getElementById("threeDGrid")
const player=document.getElementById("player")
const imgViewer=document.getElementById("imgViewer")
const intro=document.getElementById("intro")
const title=document.getElementById("title")

let state="home"
let current=""

/* 開分類 */
function openList(type){

  overlay.style.display="flex"

  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="none"

  player.style.display="none"
  imgViewer.style.display="none"
  intro.style.display="none"

  current=type
  state="list"

  if(type==="VIDEO") videoGrid.style.display="grid"
  if(type==="DESIGN") designGrid.style.display="block"
  if(type==="3D") threeDGrid.style.display="block"

  title.innerText=type
}

/* VIDEO */
function openVideo(url){
  state="item"

  player.style.display="block"
  player.src=url+"?autoplay=1"

  intro.style.display="block"
  intro.innerText="影片作品介紹：紀錄與敘事影像創作"

  videoGrid.style.display="none"
}

/* IMAGE */
function openImage(src){
  state="item"

  imgViewer.style.display="block"
  imgViewer.src=src

  designGrid.style.display="none"
  threeDGrid.style.display="none"
}

/* 點空白（核心邏輯） */
document.getElementById("close-area").onclick=()=>{

  if(state==="item"){

    player.style.display="none"
    imgViewer.style.display="none"
    intro.style.display="none"

    if(current==="VIDEO") videoGrid.style.display="grid"
    if(current==="DESIGN") designGrid.style.display="block"
    if(current==="3D") threeDGrid.style.display="block"

    state="list"
    return
  }

  if(state==="list"){
    overlay.style.display="none"
    state="home"
  }
}
</script>

</body>
</html>
