<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

#work-computer{
  width:420px;
  display:block;
  margin:30px auto;
  cursor:pointer;
  transition:0.3s;
}

#work-computer:hover{
  transform:scale(1.05);
}

/* ===== 電腦視窗 ===== */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:10;
}

#window{
  width:920px;
  height:600px;
  background:#D6CFC4;
  display:flex;
  gap:20px;
  padding:20px;
}

/* 左側列表 */
#list{
  width:320px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.video-item{
  position:relative;
  cursor:pointer;
}

.video-item img{
  width:100%;
  display:block;
}

.video-item span{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px;
  opacity:0;
}

.video-item:hover span{
  opacity:1;
}

/* 右側播放 */
#playerBox{
  flex:1;
  background:black;
}

#player{
  width:100%;
  height:100%;
  border:none;
}

/* ===== 第二層作品視窗 ===== */
#detailOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#detailBox{
  width:750px;
  background:#D6CFC4;
  padding:20px;
  border-radius:8px;
}

#detailBox iframe{
  width:100%;
  height:360px;
  border:none;
}

#title{
  font-size:22px;
  margin:10px 0;
}

#desc{
  font-size:16px;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="computer">

</section>

<!-- 電腦視窗 -->
<div id="overlay">
  <div id="window">

    <div id="list">

      <!-- VIDEO 完整9支 -->
      <div class="video-item" data-title="從污名到教育" data-desc="2025｜攝影剪輯" data-video="https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1">
        <img src="video/aids.jpg"><span>愛滋</span>
      </div>

      <div class="video-item" data-title="創傷到馨生" data-desc="2025｜攝影剪輯" data-video="https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1">
        <img src="video/crime.jpg"><span>犯保</span>
      </div>

      <div class="video-item" data-title="與傷共行" data-desc="2025" data-video="https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1">
        <img src="video/hurt.jpg"><span>與傷</span>
      </div>

      <div class="video-item" data-title="窄房" data-desc="2025" data-video="https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1">
        <img src="video/narrowhouse.png"><span>窄房</span>
      </div>

      <div class="video-item" data-title="山溝" data-desc="2024" data-video="https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1">
        <img src="video/ravine.png"><span>山溝</span>
      </div>

      <div class="video-item" data-title="Sony工作坊" data-desc="2025" data-video="https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1">
        <img src="video/sony.png"><span>Sony</span>
      </div>

      <div class="video-item" data-title="文旦新聞" data-desc="2025" data-video="https://www.peopo.org/news/822048">
        <img src="video/wendan.jpg"><span>文旦</span>
      </div>

      <div class="video-item" data-title="傳播營" data-desc="2025" data-video="https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1">
        <img src="video/camp.png"><span>營隊</span>
      </div>

      <div class="video-item" data-title="出去走走" data-desc="2025" data-video="https://www.youtube.com/embed/iD759dRtgIY?autoplay=1">
        <img src="video/gogo.jpg"><span>出去走走</span>
      </div>

    </div>

    <div id="playerBox">
      <iframe id="player"></iframe>
    </div>

  </div>
</div>

<!-- 第二層作品視窗 -->
<div id="detailOverlay">
  <div id="detailBox">
    <iframe id="frame"></iframe>
    <div id="title"></div>
    <div id="desc"></div>
  </div>
</div>

<script>

const computer=document.getElementById("computer")
const overlay=document.getElementById("overlay")

const detailOverlay=document.getElementById("detailOverlay")
const frame=document.getElementById("frame")
const title=document.getElementById("title")
const desc=document.getElementById("desc")

/* 開電腦 */
computer.onclick=()=>{
  overlay.style.display="flex"
}

/* 點影片 → 打開詳細視窗 */
document.querySelectorAll(".video-item").forEach(item=>{
  item.onclick=(e)=>{
    e.stopPropagation()

    frame.src=item.dataset.video
    title.textContent=item.dataset.title
    desc.textContent=item.dataset.desc

    detailOverlay.style.display="flex"
  }
})

/* 點空白關詳細 */
detailOverlay.onclick=()=>{
  detailOverlay.style.display="none"
  frame.src=""
}

/* 點空白關電腦 */
overlay.onclick=()=>{
  overlay.style.display="none"
}
document.getElementById("window").onclick=(e)=>e.stopPropagation()

</script>

</body>
</html>
