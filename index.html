<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h1{ font-size:60px; font-weight: normal; margin:0; }
h2{ font-size:36px; margin:0; }

section{
  padding:120px 20px;
  text-align:center;
}

/* NAV */
nav{
  position:fixed;
  top:20px;
  right:20px;
  z-index:10;
}

nav a{
  text-decoration:none;
  color:#87240E;
  font-size:18px;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{
  height:220px;
}

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
}

/* 電腦圖 */
#work-computer{
  width:320px;
  display:block;
  margin-left:auto;
  margin-right:80px;
  cursor:pointer;
  transition:0.3s;
}

#work-computer:hover{
  transform:scale(1.05);
}

/* buttons */
.category-btns button{
  margin:5px;
  padding:8px 16px;
  border:2px solid #87240E;
  background:transparent;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:#D6CFC4;
}

/* grid */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
}

.project img{
  width:100%;
}

/* =========================
   ORIGINAL OVERLAY（保留風格）
========================= */

#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#project-panel{
  background:#D6CFC4;
  color:#87240E;
  padding:30px;
  max-width:800px;
  width:90%;
  max-height:85vh;
  overflow-y:auto;
  border-radius:6px;
  text-align:center;
  position:relative;
}

#panel-close{
  position:absolute;
  right:15px;
  top:10px;
  font-size:24px;
  cursor:pointer;
}

#video-frame{
  width:100%;
  height:400px;
  border:none;
  display:none;
}

/* VIDEO LIST */
.video-item{
  display:flex;
  align-items:center;
  gap:15px;
  margin:15px 0;
  cursor:pointer;
}

.video-item img{
  width:120px;
  border-radius:6px;
}

/* CONNECT */
#connect{
  padding:60px 20px;
}
</style>
</head>

<body>

<nav>
<a href="#work">Work</a>
</nav>

<!-- HERO -->
<section id="hero">

  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>

</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="work-computer">

<div class="category-btns">
  <button onclick="filter('design')" class="active">Design</button>
  <button onclick="filter('3d')">3D</button>
</div>

<div id="all-projects">

<!-- DESIGN -->
<div class="project" data-cat="design"><img src="design/shift.jpg"></div>
<div class="project" data-cat="design"><img src="design/filmfestival.png"></div>
<div class="project" data-cat="design"><img src="design/communicationcamp.jpg"></div>
<div class="project" data-cat="design"><img src="design/voiceofzhongzheng.jpg"></div>
<div class="project" data-cat="design"><img src="design/eye.png"></div>
<div class="project" data-cat="design"><img src="design/fb.png"></div>
<div class="project" data-cat="design"><img src="design/ghost.jpg"></div>
<div class="project" data-cat="design"><img src="design/news.png"></div>
<div class="project" data-cat="design"><img src="design/one.png"></div>
<div class="project" data-cat="design"><img src="design/temperature.png"></div>

<!-- 3D -->
<div class="project" data-cat="3d"><img src="d/shixian/shixian1.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian2.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian3.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian4.png"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian5.png"></div>

</div>
</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- ⭐ 原本風格 overlay -->
<div id="overlay">
  <div id="project-panel">

    <span id="panel-close">✕</span>

    <!-- VIDEO LIST -->
    <div id="video-list">

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><p>愛滋</p>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><p>犯保</p>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><p>與傷</p>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1')">
        <img src="video/narrowhouse.png"><p>窄房</p>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1')">
        <img src="video/ravine.png"><p>山溝</p>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1')">
        <img src="video/sony.png"><p>Sony</p>
      </div>

      <div class="video-item" onclick="openVideo('https://www.peopo.org/news/822048')">
        <img src="video/wendan.jpg"><p>文旦</p>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1')">
        <img src="video/camp.png"><p>營隊</p>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/iD759dRtgIY?autoplay=1')">
        <img src="video/gogo.jpg"><p>出去走走</p>
      </div>

    </div>

    <!-- VIDEO PLAYER -->
    <iframe id="video-frame"></iframe>

  </div>
</div>

<script>

const overlay = document.getElementById("overlay")
const videoFrame = document.getElementById("video-frame")
const videoList = document.getElementById("video-list")

// ⭐ 電腦開啟 overlay
document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"
  videoList.style.display="block"
  videoFrame.style.display="none"
}

// ⭐ 關閉
document.getElementById("panel-close").onclick=()=>{
  overlay.style.display="none"
  videoFrame.src=""
}

// ⭐ 開影片
function openVideo(url){
  videoList.style.display="none"
  videoFrame.style.display="block"
  videoFrame.src=url
}

// ⭐ filter
function filter(cat){
  document.querySelectorAll(".project").forEach(p=>{
    p.style.display = p.dataset.cat===cat ? "block":"none"
  })
}

filter("design")

</script>

</body>
</html>
