<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Dela Gothic One',sans-serif;
  background:#FFFFFF;
  color:#8C3A3A;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

h1,h2,h3{
  color:#8C3A3A;
}

section{
  padding:120px 20px;
  text-align:center;
}

/* 上方右上導覽列 */
nav{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:20px;
  z-index:10;
}

nav a{
  text-decoration:none;
  color:#8C3A3A;
  font-size:18px;
}

/* hero */
#hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#hero h1{
  font-size:60px;
  margin-bottom:10px;
}

/* 分類按鈕 */
.category-btns{
  margin:30px 0;
}

.category-btns button{
  background:#FFFFFF;
  color:#8C3A3A;
  border:2px solid #8C3A3A;
  padding:10px 20px;
  margin:0 5px;
  cursor:pointer;
  font-family:'Dela Gothic One',sans-serif;
  font-size:16px;
  border-radius:4px;
  transition:0.3s;
}

.category-btns button:hover{
  opacity:0.8;
}

/* masonry layout */
.projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:40px auto;
  display:none;
}

@media (max-width:800px){
  .projects{
    column-count:2;
  }
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  border:2px solid #8C3A3A;
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.3s;
  transform-style:preserve-3d;
}

.project:hover{
  transform:scale(1.03);
}

.project img{
  width:100%;
  height:auto;
  display:block;
}

/* hover title */
.project-title{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.1);
  padding:10px;
  opacity:0;
  transition:0.3s;
  color:#8C3A3A;
}

.project:hover .project-title{
  opacity:1;
}

/* project panel */
#project-panel{
  position:fixed;
  top:0;
  right:-100%;
  width:50%;
  height:100%;
  background:#FFFFFF;
  color:#8C3A3A;
  padding:40px;
  box-sizing:border-box;
  transition:0.5s;
  overflow:auto;
  z-index:999;
}

#panel-img, #panel-video{
  width:100%;
  margin-bottom:20px;
}

#panel-close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}

/* Connect 最底部 */
#connect{
  padding:60px 20px;
  background:#FFFFFF;
  color:#8C3A3A;
  text-align:center;
}
</style>
</head>

<body>

<nav>
<a href="#work">Work</a>
<a href="#about">About</a>
</nav>

<section id="hero">
<h1>曾珮甄作品集</h1>
<p>Design / Editing / 3D Modeling</p>
</section>

<section id="about">
<h2>About</h2>
<p>這裡可以寫你的自我介紹，例如設計理念、擅長的領域、或是你想做的方向。</p>
</section>

<section id="work">
<h2>Work</h2>

<div class="category-btns">
<button data-cat="design">Design</button>
<button data-cat="editing">Editing</button>
<button data-cat="3d">3D Modeling</button>
</div>

<!-- Design -->
<div class="projects" id="design">
<div class="project" data-title="SHIFT" data-description="SHIFT 視覺設計專案，透過幾何構圖與色彩呈現動態轉變。">
<img src="design/shift.jpg">
<div class="project-title">SHIFT</div>
</div>
<div class="project" data-title="Film Festival" data-description="Film Festival 海報設計。">
<img src="design/filmfestival.png">
<div class="project-title">Film Festival</div>
</div>
<div class="project" data-title="Communication Camp" data-description="Communication Camp 視覺設計。">
<img src="design/communicationcamp.jpg">
<div class="project-title">Communication Camp</div>
</div>
<div class="project" data-title="Voice of Zhongzheng" data-description="Voice of Zhongzheng 視覺專案。">
<img src="design/voiceofzhongzheng.jpg">
<div class="project-title">Voice of Zhongzheng</div>
</div>
</div>

<!-- Editing -->
<div class="projects" id="editing">
<div class="project" data-title="Ravine" data-description="影片：ANlh-9-dZR8" data-video="https://www.youtube.com/embed/ANlh-9-dZR8?si=zwyEOQ5nlduVLKED">
<img src="editing/ravine.png">
<div class="project-title">Ravine</div>
</div>
<div class="project" data-title="Sony" data-description="影片：YSA-ws8PeJo" data-video="https://www.youtube.com/embed/YSA-ws8PeJo">
<img src="editing/sony.png">
<div class="project-title">Sony</div>
</div>
<div class="project" data-title="Wendan" data-description="影片：PeoPo" data-video="https://www.peopo.org/video/822058/embed">
<img src="editing/wendan.jpg">
<div class="project-title">Wendan</div>
</div>
</div>

<!-- 3D Modeling -->
<div class="projects" id="3d">
<div class="project" data-title="3D Project 1" data-description="3D 建模作品。">
<img src="3d/model1.jpg">
<div class="project-title">3D Project 1</div>
</div>
<div class="project" data-title="3D Project 2" data-description="3D 建模作品。">
<img src="3d/model2.jpg">
<div class="project-title">3D Project 2</div>
</div>
</div>

</section>

<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<div id="project-panel">
<span id="panel-close">✕</span>
<div id="panel-img-container">
<img id="panel-img">
<iframe id="panel-video" width="100%" height="315" frameborder="0" allowfullscreen style="display:none;"></iframe>
</div>
<h2 id="panel-title"></h2>
<p id="panel-text"></p>
</div>

<script>
// 右側 project panel
const projects = document.querySelectorAll(".project")
const panel = document.getElementById("project-panel")
const panelImg = document.getElementById("panel-img")
const panelVideo = document.getElementById("panel-video")
const panelTitle = document.getElementById("panel-title")
const panelText = document.getElementById("panel-text")

projects.forEach(project=>{
  project.addEventListener("click",()=>{
    panel.style.right="0"
    const videoUrl = project.dataset.video
    if(videoUrl){
      panelImg.style.display="none"
      panelVideo.style.display="block"
      panelVideo.src = videoUrl
    } else {
      panelVideo.style.display="none"
      panelImg.style.display="block"
      panelImg.src=project.querySelector("img").src
    }
    panelTitle.textContent=project.dataset.title
    panelText.textContent=project.dataset.description
  })
})

// 點擊叉叉或任意空白處關閉 panel
function closePanel(){
  panel.style.right="-100%"
  panelVideo.src = "" // 停止影片播放
}

document.getElementById("panel-close").onclick=closePanel
document.addEventListener('click', (e)=>{
  if(!panel.contains(e.target) && !e.target.classList.contains('project-title') && !e.target.closest('.project')){
    closePanel()
  }
})

// 3D hover
const cards=document.querySelectorAll(".project")
cards.forEach(card=>{
  card.addEventListener("mousemove",(e)=>{
    const rect=card.getBoundingClientRect()
    const x=e.clientX-rect.left
    const y=e.clientY-rect.top
    const centerX=rect.width/2
    const centerY=rect.height/2
    const rotateX=(y-centerY)/10
    const rotateY=(centerX-x)/10
    card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`
  })
  card.addEventListener("mouseleave",()=>{
    card.style.transform="rotateX(0) rotateY(0) scale(1)"
  })
})

// 分類按鈕切換
const buttons = document.querySelectorAll('.category-btns button');
buttons.forEach(btn=>{
  btn.addEventListener('click',()=>{
    const cat = btn.dataset.cat;
    document.querySelectorAll('.projects').forEach(p=>p.style.display='none');
    document.getElementById(cat).style.display='block';
  })
});
</script>

</body>
</html>
