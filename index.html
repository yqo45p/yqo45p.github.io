<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

/* 電腦圖 */
#work-computer{
  width:380px;
  display:block;
  margin:25px auto;
  cursor:pointer;
  transition:0.3s;
}
#work-computer:hover{ transform:scale(1.03); }

/* CATEGORY */
.category-btns button{
  margin:5px;
  padding:8px 16px;
  border:2px solid #87240E;
  background:transparent;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:#D6CFC4;
}

/* 瀑布流 */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:30px auto;
}

@media (max-width:900px){
  #all-projects{ column-count:2; }
}

@media (max-width:600px){
  #all-projects{ column-count:1; }
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  cursor:pointer;
  position:relative;
}

.project img{
  width:100%;
  display:block;
}

/* hover title */
.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.55);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* panel */
#panel{
  background:#D6CFC4;
  color:#87240E;
  padding:25px;
  width:90%;
  max-width:850px;
  border-radius:6px;
  position:relative;
  max-height:85vh;
  overflow-y:auto;
}

/* title */
#panel-title{
  font-size:26px;
  margin-bottom:10px;
}

/* desc */
#panel-desc{
  font-size:16px;
  line-height:1.6;
  margin-bottom:15px;
}

/* video grid */
.video-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.video-item{
  cursor:pointer;
  position:relative;
}

.video-item img{
  width:100%;
}

.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px;
  opacity:0;
  transition:0.3s;
}

.video-item:hover .video-title{
  opacity:1;
}

/* player */
#player{
  width:100%;
  height:420px;
  border:none;
  display:none;
}

/* 點空白關閉 */
#close-area{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="work-computer">

<div class="category-btns">
  <button onclick="filter('design')" class="active">Design</button>
  <button onclick="filter('3d')">3D</button>
</div>

<!-- PROJECTS -->
<div id="all-projects">

<!-- DESIGN -->
<div class="project" data-cat="design" data-title="移面之詞" data-description="2026 主視覺">
  <img src="design/shift.jpg">
  <div class="project-title">移面之詞</div>
</div>

<div class="project" data-cat="design" data-title="瘋影展" data-description="2025 海報">
  <img src="design/filmfestival.png">
  <div class="project-title">瘋影展</div>
</div>

<div class="project" data-cat="design" data-title="傳播營" data-description="2024 活動設計">
  <img src="design/communicationcamp.jpg">
  <div class="project-title">傳播營</div>
</div>

<!-- 3D -->
<div class="project" data-cat="3d" data-title="展場設計" data-description="空間作品">
  <img src="d/shixian/shixian1.jpg">
  <div class="project-title">展場設計</div>
</div>

</div>
</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- OVERLAY -->
<div id="overlay">
  <div id="close-area"></div>

  <div id="panel">
    <h2 id="panel-title"></h2>
    <p id="panel-desc"></p>

    <!-- VIDEO GRID -->
    <div class="video-grid" id="videoGrid">

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><div class="video-title">愛滋</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><div class="video-title">犯保</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><div class="video-title">與傷</div>
      </div>

    </div>

    <iframe id="player"></iframe>
  </div>
</div>

<script>

const overlay=document.getElementById("overlay")
const closeArea=document.getElementById("close-area")
const videoGrid=document.getElementById("videoGrid")
const player=document.getElementById("player")

const panelTitle=document.getElementById("panel-title")
const panelDesc=document.getElementById("panel-desc")

const projects=document.querySelectorAll(".project")

/* 點電腦 */
document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="grid"
  player.style.display="none"
  player.src=""
  panelTitle.textContent="Video Works"
  panelDesc.textContent="點擊影片觀看（自動播放）"
}

/* 點作品 */
projects.forEach(p=>{
  p.onclick=()=>{
    overlay.style.display="flex"
    videoGrid.style.display="none"
    player.style.display="none"

    panelTitle.textContent=p.dataset.title
    panelDesc.textContent=p.dataset.description
  }
})

/* 開影片（自動播放） */
function openVideo(url){
  videoGrid.style.display="none"
  player.style.display="block"
  player.src=url + "&autoplay=1"
}

/* 點空白關閉 */
closeArea.onclick=()=>{
  overlay.style.display="none"
  player.src=""
}

/* filter */
function filter(cat){
  document.querySelectorAll(".project").forEach(p=>{
    p.style.display = p.dataset.cat===cat?"block":"none"
  })
}

filter("design")

</script>

</body>
</html>
