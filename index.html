<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

#work-computer{
  width:360px;
  display:block;
  margin:25px auto;
  cursor:pointer;
  transition:0.3s;
}
#work-computer:hover{ transform:scale(1.04); }

/* CATEGORY */
.category-btns button{
  margin:5px;
  padding:8px 16px;
  border:2px solid #87240E;
  background:transparent;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:#D6CFC4;
}

/* PROJECT GRID */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:30px auto;
}

@media (max-width:900px){
  #all-projects{ column-count:2; }
}

@media (max-width:600px){
  #all-projects{ column-count:1; }
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  cursor:pointer;
  position:relative;
}

.project img{
  width:100%;
  display:block;
}

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.55);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* hide filter fix */
.hide{
  display:none !important;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  color:#87240E;
  padding:25px;
  width:90%;
  max-width:850px;
  border-radius:6px;
  position:relative;
  max-height:85vh;
  overflow-y:auto;
  text-align:center;
}

#panel-title{
  font-size:26px;
  margin-bottom:10px;
}

#panel-desc{
  margin-bottom:15px;
  opacity:0.8;
  line-height:1.6;
}

/* VIDEO */
#player{
  width:100%;
  height:420px;
  border:none;
  display:none;
}

/* CLOSE */
#close-area{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="work-computer">

<div class="category-btns">
  <button onclick="filter('video')" class="active">Video</button>
</div>

<div id="all-projects">

<!-- PROJECTS -->
<div class="project" data-cat="video"

<div class="project" data-cat="video"

<div class="project" data-cat="video"

</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- OVERLAY -->
<div id="overlay">
  <div id="close-area"></div>

  <div id="panel">
    <h2 id="panel-title"></h2>
    <p id="panel-desc"></p>
    <iframe id="player"></iframe>
  </div>
</div>

<script>

const overlay = document.getElementById("overlay")
const closeArea = document.getElementById("close-area")
const player = document.getElementById("player")
const panelTitle = document.getElementById("panel-title")
const panelDesc = document.getElementById("panel-desc")
const projects = document.querySelectorAll(".project")

/* 點作品 */
projects.forEach(p=>{
  p.onclick=()=>{

    overlay.style.display="flex"

    panelTitle.textContent = p.dataset.title
    panelDesc.textContent = p.dataset.description

    player.style.display="block"
    player.src = p.dataset.video
  }
})

/* 點 com.webp */
document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"

  panelTitle.textContent="Video"
  panelDesc.textContent=""

  player.style.display="none"
  player.src=""
}

/* 關閉 */
closeArea.onclick=()=>{
  overlay.style.display="none"
  player.src=""
  player.style.display="none"
}

/* FILTER（已修正） */
function filter(cat){
  document.querySelectorAll(".project").forEach(p=>{
    if(p.dataset.cat === cat){
      p.classList.remove("hide")
    }else{
      p.classList.add("hide")
    }
  })
}

filter("video")

</script>

</body>
</html>
