<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
  overflow-x:hidden;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50%;
  height:50%;
  object-fit:cover;
}

/* CATEGORY */
.category-btns{
  text-align:center;
  margin:30px 0;
}

.category-btns button{
  margin:0 5px;
  padding:10px 18px;
  border:2px solid #87240E;
  background:#D6CFC4;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:#D6CFC4;
}

/* ROW */
.row{
  margin:50px 0;
}

.row h3{
  text-align:left;
  padding-left:20px;
}

/* CAROUSEL */
.carousel{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px 20px;
}

.carousel::-webkit-scrollbar{
  display:none;
}

/* CARD */
.project{
  min-width:220px;
  height:140px;
  flex-shrink:0;
  border-radius:8px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.project img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.project:hover{
  transform:scale(1.15);
  z-index:10;
}

.project-title{
  position:absolute;
  bottom:0;
  width:100%;
  padding:8px;
  color:white;
  background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  opacity:0;
}

.project:hover .project-title{ opacity:1; }

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#project-panel{
  background:#D6CFC4;
  padding:30px;
  width:80%;
  max-width:800px;
  border-radius:10px;
  position:relative;
}

#panel-img{ width:60%; display:block; margin:auto; }

#panel-video{
  width:100%;
  height:400px;
  display:none;
}

#panel-close{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>

<!-- CATEGORY -->
<div class="category-btns">
  <button class="active" data-cat="video">Video</button>
  <button data-cat="design">Design</button>
  <button data-cat="3d">3D</button>

<!-- ================= 3D ================= -->

<div class="project" data-cat="3d"

<!-- OVERLAY -->
<div id="overlay">
<div id="project-panel">
<span id="panel-close">✕</span>
<img id="panel-img">
<iframe id="panel-video"></iframe>
<h2 id="panel-title"></h2>
<p id="panel-text"></p>
<div id="panel-extra-images"></div>
</div>
</div>

<script>
const projects=document.querySelectorAll(".project")
const overlay=document.getElementById("overlay")
const panelImg=document.getElementById("panel-img")
const panelVideo=document.getElementById("panel-video")
const panelTitle=document.getElementById("panel-title")
const panelText=document.getElementById("panel-text")
const panelExtraImages=document.getElementById("panel-extra-images")

projects.forEach(p=>{
  p.onclick=()=>{
    overlay.style.display="flex"

    panelTitle.textContent=p.dataset.title
    panelText.textContent=p.dataset.description || ""

    const video=p.dataset.video
    const images=p.dataset.images

    if(video){
      panelVideo.style.display="block"
      panelImg.style.display="none"
      panelVideo.src=video
    }else{
      panelVideo.style.display="none"
      panelImg.style.display="block"
      panelImg.src=p.querySelector("img").src
    }

    panelExtraImages.innerHTML=""
    if(images){
      images.split(",").forEach(src=>{
        const img=document.createElement("img")
        img.src=src
        img.style.width="45%"
        panelExtraImages.appendChild(img)
      })
    }
  }
})

document.getElementById("panel-close").onclick=()=>{
  overlay.style.display="none"
  panelVideo.src=""
}

/* Netflix filter */
const buttons=document.querySelectorAll(".category-btns button")
const rows=document.querySelectorAll(".row")

buttons.forEach(btn=>{
  btn.onclick=()=>{
    buttons.forEach(b=>b.classList.remove("active"))
    btn.classList.add("active")

    const cat=btn.dataset.cat

    rows.forEach(r=>{
      r.style.display = (r.dataset.row===cat) ? "block" : "none"
    })
  }
})

document.querySelector('[data-cat="video"]').click()
</script>

</body>
</html>
