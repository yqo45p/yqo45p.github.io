<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<link rel="icon" href="good/logo.png?v=3">

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  padding:140px 20px 80px;
  display:flex;
  justify-content:center;
  gap:70px;
  flex-wrap:wrap;
  text-align:center;
}

#work img{
  width:360px;
  cursor:pointer;
  transition:0.3s;
}

.work-item{text-align:center;}

.work-text{
  font-size:28px;
  letter-spacing:2px;
  color:#87240E;
  margin-bottom:5px;
}

#work img:hover{transform:scale(1.04);}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  padding:25px;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
}

#panel-title{
  text-align:center;
}

/* GRID */
.video-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.masonry{
  display:none;
  column-count:3;
  column-gap:15px;
}

.project,.video-item{
  break-inside:avoid;
  margin-bottom:10px;
  cursor:pointer;
  position:relative;
}

.project img,.video-item img{width:100%;}

.project-title,.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:6px;
  opacity:0;
}

.project:hover .project-title,
.video-item:hover .video-title{
  opacity:1;
}

/* 影片 + 圖片 */
#player{
  width:100%;
  height:420px;
  display:none;
  border:none;
}

#imgViewer{
  width:100%;
  display:none;
}

/* ⭐ 介紹 */
#infoBox{
  display:none;
  margin-top:10px;
  font-size:18px;
  color:#333;
}
</style>
</head>

<body>

<!-- HERO（完全不動） -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK（完全不動） -->
<section id="work">

<div class="work-item" id="work-computer">
  <div class="work-text">VIDEO</div>
  <img src="good/ca.webp">
</div>

<div class="work-item" id="work-table">
  <div class="work-text">DESIGN</div>
  <img src="good/table.webp">
</div>

<div class="work-item" id="work-ca">
  <div class="work-text">3D</div>
  <img src="good/com.webp">
</div>

</section>

<!-- OVERLAY -->
<div id="overlay">
<div id="panel">
<h2 id="panel-title"></h2>

<!-- VIDEO（完全保留） -->
<div class="video-grid" id="videoGrid">

<div class="video-item" onclick="openVideo('D-h27S7wz5s','從污名到教育')">
<img src="video/aids.jpg"><div class="video-title">愛滋</div></div>

<div class="video-item" onclick="openVideo('_tzyIj1j39Q','創傷重建')">
<img src="video/crime.jpg"><div class="video-title">犯保</div></div>

<div class="video-item" onclick="openVideo('DDLpt_OMKXY','與傷共行')">
<img src="video/hurt.jpg"><div class="video-title">心理</div></div>

<div class="video-item" onclick="openVideo('ODA4hvMLTbk','窄房')">
<img src="video/narrowhouse.png"><div class="video-title">窄房</div></div>

<div class="video-item" onclick="openVideo('ANlh-9-dZR8','山溝')">
<img src="video/ravine.png"><div class="video-title">山溝</div></div>

</div>

<!-- DESIGN（完全保留） -->
<div class="masonry" id="designGrid">

<div class="project" onclick="openImage('design/shift.jpg','移面之詞')">
<img src="design/shift.jpg"><div class="project-title">移面之詞</div></div>

<div class="project" onclick="openImage('design/filmfestival.png','瘋影展')">
<img src="design/filmfestival.png"><div class="project-title">影展</div></div>

</div>

<!-- 3D（完全保留） -->
<div class="masonry" id="threeDGrid">

<div class="project" onclick="openImage('d/shixian/shixian1.jpg','世賢圖書館')">
<img src="d/shixian/shixian1.jpg"><div class="project-title">圖書館</div></div>

<div class="project" onclick="openImage('d/library/library1.jpg','嘉義圖書館')">
<img src="d/library/library1.jpg"><div class="project-title">圖書館</div></div>

</div>

<!-- 顯示區 -->
<iframe id="player"></iframe>
<img id="imgViewer">
<div id="infoBox"></div>

</div>
</div>

<script>
const overlay=document.getElementById("overlay")
const videoGrid=document.getElementById("videoGrid")
const designGrid=document.getElementById("designGrid")
const threeDGrid=document.getElementById("threeDGrid")
const player=document.getElementById("player")
const imgViewer=document.getElementById("imgViewer")
const infoBox=document.getElementById("infoBox")
const panelTitle=document.getElementById("panel-title")

let state="home"

/* VIDEO */
function openVideo(id,title){
  state="item"
  overlay.style.display="flex"

  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="none"

  imgViewer.style.display="none"
  player.style.display="block"

  player.src="https://www.youtube.com/embed/"+id+"?autoplay=1"
  infoBox.style.display="block"
  infoBox.innerText=title
}

/* IMAGE */
function openImage(src,title){
  state="item"
  overlay.style.display="flex"

  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="none"

  player.style.display="none"
  imgViewer.style.display="block"

  imgViewer.src=src
  infoBox.style.display="block"
  infoBox.innerText=title
}

/* 打開分類 */
document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="grid"
  designGrid.style.display="none"
  threeDGrid.style.display="none"
  panelTitle.textContent="VIDEO"
}

document.getElementById("work-table").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="none"
  designGrid.style.display="block"
  threeDGrid.style.display="none"
  panelTitle.textContent="DESIGN"
}

document.getElementById("work-ca").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="none"
  designGrid.style.display="none"
  threeDGrid.style.display="block"
  panelTitle.textContent="3D"
}

/* 關閉 */
document.getElementById("overlay").onclick=()=>{
  overlay.style.display="none"
  player.src=""
  imgViewer.src=""
  state="home"
}
</script>

</body>
</html>
