<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
  overflow-x:hidden;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

/* com.webp（只微調） */
#work-computer{
  width:360px;
  display:block;
  margin:20px auto;
  cursor:pointer;
  transition:0.2s;
}
#work-computer:hover{
  transform:scale(1.03);
}

/* ====== 瀑布流作品 ====== */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  position:relative;
  cursor:pointer;
}

.project img{
  width:100%;
  display:block;
}

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.45);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* ====== OVERLAY（唯一彈窗） ====== */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* 彈窗內容 */
#panel{
  background:#D6CFC4;
  width:900px;
  max-height:85vh;
  overflow-y:auto;
  border-radius:8px;
  padding:20px;
  position:relative;
}

/* VIDEO GRID（瀑布） */
.video-grid{
  column-count:3;
  column-gap:10px;
}

.video-item{
  position:relative;
  margin-bottom:10px;
  cursor:pointer;
}

.video-item img{
  width:100%;
  display:block;
}

.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  font-size:13px;
  padding:5px;
  opacity:0;
}

.video-item:hover .video-title{
  opacity:1;
}

/* 播放器（不全螢幕） */
#player{
  width:100%;
  height:420px;
  border:none;
  display:none;
  margin-bottom:10px;
}

</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<!-- com.webp -->
<img src="good/com.webp" id="work-computer">

<!-- DESIGN + 3D（完整保留） -->
<div id="all-projects">

<div class="project" data-cat="design"><img src="design/shift.jpg"><div class="project-title">移面之詞</div></div>
<div class="project" data-cat="design"><img src="design/filmfestival.png"><div class="project-title">瘋影展</div></div>
<div class="project" data-cat="design"><img src="design/communicationcamp.jpg"><div class="project-title">傳播營</div></div>
<div class="project" data-cat="design"><img src="design/voiceofzhongzheng.jpg"><div class="project-title">中正之聲</div></div>
<div class="project" data-cat="design"><img src="design/eye.png"><div class="project-title">活動</div></div>
<div class="project" data-cat="design"><img src="design/fb.png"><div class="project-title">E報</div></div>
<div class="project" data-cat="design"><img src="design/ghost.jpg"><div class="project-title">活動</div></div>
<div class="project" data-cat="design"><img src="design/news.png"><div class="project-title">新傳獎</div></div>
<div class="project" data-cat="design"><img src="design/one.png"><div class="project-title">活動</div></div>
<div class="project" data-cat="design"><img src="design/temperature.png"><div class="project-title">專輯</div></div>

<div class="project" data-cat="3d"><img src="d/shixian/shixian1.jpg"><div class="project-title">世賢</div></div>
<div class="project" data-cat="3d"><img src="d/library/library1.jpg"><div class="project-title">圖書館</div></div>

</div>
</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- ===== VIDEO OVERLAY ===== -->
<div id="overlay">
  <div id="panel">

    <iframe id="player" allow="autoplay"></iframe>

    <div class="video-grid" id="videoGrid">

      <div class="video-item" onclick="play('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><div class="video-title">愛滋</div>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><div class="video-title">犯保</div>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><div class="video-title">與傷</div>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1')">
        <img src="video/narrowhouse.png"><div class="video-title">窄房</div>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1')">
        <img src="video/ravine.png"><div class="video-title">山溝</div>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1')">
        <img src="video/sony.png"><div class="video-title">Sony</div>
      </div>

    </div>

  </div>
</div>

<script>

const overlay=document.getElementById("overlay")
const player=document.getElementById("player")
const videoGrid=document.getElementById("videoGrid")

// 開 video 清單
document.getElementById("work-computer").onclick=()=>{
  overlay.style.display="flex"
  videoGrid.style.display="grid"
  player.style.display="none"
  player.src=""
}

// 播放影片（不全螢幕）
function play(url){
  videoGrid.style.display="none"
  player.style.display="block"
  player.src=url
}

// 點空白：回列表（不是關閉）
overlay.onclick=()=>{
  player.style.display="none"
  player.src=""
  videoGrid.style.display="grid"
}

// 防止點內容關閉
document.getElementById("panel").onclick=(e)=>e.stopPropagation()

</script>

</body>
</html>
