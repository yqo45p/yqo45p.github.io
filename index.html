<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

/* WORK */
#work{
  text-align:center;
  padding:100px 20px;
}

#work-computer{
  width:260px;
  cursor:pointer;
  margin-bottom:20px;
}

/* CATEGORY */
.category-btns button{
  border:2px solid #87240E;
  background:none;
  padding:8px 16px;
  margin:0 5px;
  cursor:pointer;
}

.category-btns button.active{
  background:#87240E;
  color:white;
}

/* GRID */
#work-grid{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  cursor:pointer;
  position:relative;
}

.project img{
  width:100%;
  display:block;
}

/* VIDEO DESKTOP */
#desktop{
  display:none;
  position:fixed;
  inset:0;
  background:#1a1a1a;
  z-index:999;
  color:white;
}

#desktop-bar{
  height:40px;
  background:#333;
  display:flex;
  align-items:center;
  padding:0 15px;
}

#desktop-area{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:40px;
}

.icon{
  width:120px;
  text-align:center;
  cursor:pointer;
}

.icon img{
  width:100%;
  border-radius:8px;
}

.icon p{
  font-size:14px;
}

/* VIDEO OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#panel{
  background:black;
  width:80%;
  max-width:900px;
  padding:20px;
}

#panel iframe{
  width:100%;
  height:450px;
  border:none;
}

#close{
  float:right;
  color:white;
  cursor:pointer;
  font-size:20px;
}

</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<!-- ⭐ 電腦入口 -->
<img src="good/com.webp" id="work-computer">

<!-- ⭐ CATEGORY（完整保留） -->
<div class="category-btns">
  <button onclick="filter('design')" class="active">Design</button>
  <button onclick="filter('3d')">3D</button>
</div>

<!-- ⭐ DESIGN（全部保留，不刪任何一個） -->
<div id="work-grid">

<div class="project" data-cat="design"><img src="design/shift.jpg"></div>
<div class="project" data-cat="design"><img src="design/filmfestival.png"></div>
<div class="project" data-cat="design"><img src="design/communicationcamp.jpg"></div>
<div class="project" data-cat="design"><img src="design/voiceofzhongzheng.jpg"></div>
<div class="project" data-cat="design"><img src="design/eye.png"></div>
<div class="project" data-cat="design"><img src="design/fb.png"></div>
<div class="project" data-cat="design"><img src="design/ghost.jpg"></div>
<div class="project" data-cat="design"><img src="design/news.png"></div>
<div class="project" data-cat="design"><img src="design/one.png"></div>
<div class="project" data-cat="design"><img src="design/temperature.png"></div>

<!-- ⭐ 3D（全部保留） -->
<div class="project" data-cat="3d"><img src="d/shixian/shixian1.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian2.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian3.jpg"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian4.png"></div>
<div class="project" data-cat="3d"><img src="d/shixian/shixian5.png"></div>

<div class="project" data-cat="3d"><img src="d/library/library1.jpg"></div>
<div class="project" data-cat="3d"><img src="d/library/library2.jpg"></div>
<div class="project" data-cat="3d"><img src="d/library/library3.jpg"></div>
<div class="project" data-cat="3d"><img src="d/library/library4.jpg"></div>

</div>

</section>

<!-- ⭐ DESKTOP VIDEO（9支完整保留） -->
<div id="desktop">

<div id="desktop-bar">📁 Video Projects</div>

<div id="desktop-area">

<div class="icon" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
<img src="video/aids.jpg"><p>愛滋風險</p></div>

<div class="icon" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
<img src="video/crime.jpg"><p>犯保</p></div>

<div class="icon" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
<img src="video/hurt.jpg"><p>與傷共行</p></div>

<div class="icon" onclick="openVideo('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1')">
<img src="video/narrowhouse.png"><p>窄房</p></div>

<div class="icon" onclick="openVideo('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1')">
<img src="video/ravine.png"><p>山溝</p></div>

<div class="icon" onclick="openVideo('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1')">
<img src="video/sony.png"><p>Sony</p></div>

<div class="icon" onclick="openVideo('https://www.peopo.org/news/822048')">
<img src="video/wendan.jpg"><p>文旦</p></div>

<div class="icon" onclick="openVideo('https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1')">
<img src="video/camp.png"><p>傳播營</p></div>

<div class="icon" onclick="openVideo('https://www.youtube.com/embed/iD759dRtgIY?autoplay=1')">
<img src="video/gogo.jpg"><p>出去走走</p></div>

</div>
</div>

<!-- VIDEO OVERLAY -->
<div id="overlay">
<div id="panel">
<span id="close" onclick="closeVideo()">✕</span>
<iframe id="videoFrame"></iframe>
</div>
</div>

<script>

/* 電腦開啟 desktop */
document.getElementById("work-computer").onclick=()=>{
  document.getElementById("desktop").style.display="block"
}

/* 開影片 */
function openVideo(url){
  document.getElementById("overlay").style.display="flex"
  document.getElementById("videoFrame").src=url
}

/* 關影片 */
function closeVideo(){
  document.getElementById("overlay").style.display="none"
  document.getElementById("videoFrame").src=""
}

/* filter */
function filter(cat){
  document.querySelectorAll("#work-grid .project").forEach(p=>{
    p.style.display = p.dataset.cat===cat ? "block":"none"
  })
}

filter("design")

</script>

</body>
</html>
