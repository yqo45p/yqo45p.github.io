<!DOCTYPE html>

<head>

<title>曾珮甄作品集</title>

<style>
@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h1{ font-size:60px; font-weight: normal; color:#87240E; margin:0; }
h2{ font-size:36px; color:#87240E; margin:0; }
section{ padding:120px 20px; text-align:center; }

/* navbar */
nav{ position:fixed; top:20px; right:20px; display:flex; gap:20px; z-index:10; }
nav a{ text-decoration:none; color:#87240E; font-size:18px; }

/* hero 區塊 */
#hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* 三張圖片往下 50px，置於影片上層 */
.hero-images {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 25px;
  z-index: 3;
}

.hero-images img {
  height: 220px;
}

/* 背景影片置中 */
#hero video {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 50%;
  height: 50%;
  object-fit: cover;
  z-index: 1;
}

/* category */
.category-btns{ margin:30px 0; }
.category-btns button{
    background:#D6CFC4;
    color:#87240E;
    border:2px solid #87240E;
    padding:10px 20px;
    margin:0 5px;
    cursor:pointer;
    font-family:'MantouSans';
    font-size:16px;
    border-radius:4px;
    transition:0.3s;
}
.category-btns button.active{
    background:#87240E;
    color:#D6CFC4;
}

/* masonry */
#all-projects{
    column-count:3;
    column-gap:20px;
    max-width:1100px;
    margin:40px auto;
}
@media (max-width:800px){ #all-projects{ column-count:2; } }

.project{
    break-inside:avoid;
    margin-bottom:20px;
    cursor:pointer;
    position:relative;
}
.project img{ width:100%; display:block; }

/* hover text */
.project-title{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.4);
    padding:10px;
    opacity:0;
    transition:0.3s;
    color:#FFFFFF;
}
.project:hover .project-title{ opacity:1; }

/* overlay */
#overlay{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
    z-index:999;
}
/* panel */
#project-panel{
    background:#D6CFC4;
    color:#87240E;
    padding:30px;
    max-width:800px;
    width:90%;
    max-height:85vh;
    overflow-y:auto;
    border-radius:6px;
    text-align:center;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
}
#panel-img{ max-width:60%; height:auto; margin-bottom:20px; }
#panel-video{ width:70%; height:380px; margin-bottom:20px; border:none; }
#panel-extra-images{ display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
#panel-close{ position:absolute; top:10px; right:15px; font-size:28px; cursor:pointer; }
#connect{ padding:60px 20px; text-align:center; }

/* 作品面板文字設定 */
#panel-title {
    font-weight: normal;
    font-size:28px;
    margin-bottom:15px;
}
#panel-text {
    font-size:19px;
    line-height:1.6;
}

/* 手機版優化 */
@media (max-width: 800px) {
  #hero {
    height: 60vh;
  }
  #hero video {
    width: 120%;
    height: auto;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .hero-images img {
    height: 140px;
  }
  .hero-images {
    top: 30px;
  }
}
</style>
</head>

<script>
// Project 面板
const projects=document.querySelectorAll(".project")
const overlay=document.getElementById("overlay")
const panelImg=document.getElementById("panel-img")
const panelVideo=document.getElementById("panel-video")
const panelTitle=document.getElementById("panel-title")
const panelText=document.getElementById("panel-text")
const panelExtraImages=document.getElementById("panel-extra-images")

projects.forEach(project=>{
  project.onclick=()=>{
    overlay.style.display="flex"
    const video=project.dataset.video
    const images=project.dataset.images
    panelTitle.textContent=project.dataset.title
    panelText.innerHTML=project.dataset.description
    panelExtraImages.innerHTML=""
    if(video){
      panelImg.style.display="none"
      panelVideo.style.display="block"
      panelVideo.src=video
    }else{
      panelVideo.style.display="none"
      panelImg.style.display="block"
      panelImg.src=project.querySelector("img").src
    }
    if(images){
      const imgs=images.split(",")
      imgs.forEach(src=>{
        const imgEl=document.createElement("img")
        imgEl.src=src
        imgEl.style.width="45%"
        imgEl.style.marginBottom="10px"
        panelExtraImages.appendChild(imgEl)
      })
    }
  }
})

overlay.onclick=()=>{
  overlay.style.display="none"
  panelVideo.src=""
}

document.getElementById("panel-close").onclick=()=>{
  overlay.style.display="none"
  panelVideo.src=""
}

document.getElementById("project-panel").onclick=(e)=>{
  e.stopPropagation()
}

// 分類過濾
const buttons=document.querySelectorAll(".category-btns button")
const allProjects=document.querySelectorAll("#all-projects .project")
allProjects.forEach(p => p.style.display="block")
buttons.forEach(btn=>{
  btn.onclick=()=>{
    buttons.forEach(b=>b.classList.remove("active"))
    btn.classList.add("active")
    const cat=btn.dataset.cat
    allProjects.forEach(p=>{
      p.style.display=(cat==="all" || p.dataset.cat===cat)?"block":"none"
    })
  }
})
</script>
