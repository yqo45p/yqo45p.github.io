<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<link rel="icon" href="good/logo.png?v=3">

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* ================= HERO ================= */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* ================= WORK ================= */
#work{
  padding:140px 20px 80px;
  display:flex;
  justify-content:center;
  gap:70px;
  flex-wrap:wrap;
  text-align:center;
}

.work-item{
  cursor:pointer;
  text-align:center;
}

.work-text{
  font-size:28px;
  margin-bottom:5px;
}

.work-item img{
  width:360px;
  transition:0.3s;
}

.work-item img:hover{
  transform:scale(1.05);
}

/* ================= OVERLAY ================= */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#panel{
  background:#D6CFC4;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
  padding:20px;
}

/* ================= GRID ================= */
.video-grid,
.masonry{
  display:none;
}

.video-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
  
.masonry{
  column-count:3;
  column-gap:15px;
}

/* ================= ITEM ================= */
.item{
  position:relative;
  margin-bottom:10px;
  cursor:pointer;
}

.item img{
  width:100%;
  transition:0.3s;
}

.item:hover img{
  transform:scale(1.05);
}

.title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px;
  opacity:0;
}

.item:hover .title{
  opacity:1;
}

/* ================= CONTENT ================= */
#player{
  width:100%;
  height:420px;
  display:none;
  border:none;
}

#imgViewer{
  width:100%;
  display:none;
}

#intro{
  display:none;
  margin-top:10px;
  line-height:1.6;
}

/* ================= CLOSE ================= */
#close-area{
  position:absolute;
  inset:0;
  background:transparent;
}
</style>
</head>

<body>

<!-- ================= HERO ================= -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- ================= WORK ================= -->
<section id="work">

<div class="work-item" onclick="openList('VIDEO')">
  <div class="work-text">VIDEO</div>
  <img src="good/ca.webp">
</div>

<div class="work-item" onclick="openList('DESIGN')">
  <div class="work-text">DESIGN</div>
  <img src="good/table.webp">
</div>

<div class="work-item" onclick="openList('3D')">
  <div class="work-text">3D</div>
  <img src="good/com.webp">
</div>

</section>

<!-- ================= OVERLAY ================= -->
<div id="overlay">
<div id="close-area"></div>

<div id="panel" onclick="event.stopPropagation()">

<h2 id="title"></h2>

<!-- VIDEO -->
<div id="videoGrid" class="video-grid">

<div class="item" onclick="openVideo(this,'https://www.youtube.com/embed/D-h27S7wz5s')">
<img src="video/aids.jpg">
<div class="title">愛滋紀錄</div>
</div>

<div class="item" onclick="openVideo(this,'https://www.youtube.com/embed/_tzyIj1j39Q')">
<img src="video/crime.jpg">
<div class="title">創傷修復</div>
</div>

<div class="item" onclick="openVideo(this,'https://www.youtube.com/embed/DDLpt_OMKXY')">
<img src="video/hurt.jpg">
<div class="title">與傷共行</div>
</div>

</div>

<!-- DESIGN -->
<div id="designGrid" class="masonry">

<div class="item" onclick="openImage('design/shift.jpg','移面之詞主視覺')">
<img src="design/shift.jpg">
<div class="title">移面之詞</div>
</div>

<div class="item" onclick="openImage('design/filmfestival.png','影展海報設計')">
<img src="design/filmfestival.png">
<div class="title">影展海報</div>
</div>

</div>

<!-- 3D -->
<div id="threeDGrid" class="masonry">

<div class="item" onclick="openImage('d/shixian/shixian1.jpg','展場空間設計')">
<img src="d/shixian/shixian1.jpg">
<div class="title">展場設計</div>
</div>

</div>

<!-- CONTENT -->
<iframe id="player"></iframe>
<img id="imgViewer">
<div id="intro"></div>

</div>
</div>

<script>

const overlay=document.getElementById("overlay")
const videoGrid=document.getElementById("videoGrid")
const designGrid=document.getElementById("designGrid")
const threeDGrid=document.getElementById("threeDGrid")
const player=document.getElementById("player")
const imgViewer=document.getElementById("imgViewer")
const intro=document.getElementById("intro")
const title=document.getElementById("title")

let state="home"
let current=""

/* 開列表 */
function openList(type){

  videoGrid.style.display="none"
designGrid.style.display="none"
threeDGrid.style.display="none"

overlay.style.display="flex"

  player.style.display="none"
  player.src=""

  imgViewer.style.display="none"
  intro.style.display="none"

  current=type
  state="list"

  if(type==="VIDEO") videoGrid.style.display="grid"
  if(type==="DESIGN") designGrid.style.display="block"
  if(type==="3D") threeDGrid.style.display="block"

  title.innerText=type
}

/* 🎬 影片（點了才播放） */
function openVideo(el,url){

  state="item"

  videoGrid.style.display="none"
intro.style.display="none"
intro.innerText=""

  player.style.display="block"
  player.src=url + "?autoplay=1&mute=1"

  intro.style.display="block"
  intro.innerText=el.querySelector(".title").innerText + "｜影片作品介紹"
}

/* 🖼 圖片 */
function openImage(src,text){

  state="item"

  designGrid.style.display="none"
  threeDGrid.style.display="none"

  imgViewer.style.display="block"
  imgViewer.src=src

  intro.style.display="block"
  intro.innerText=text
}
  document.getElementById("close-area").onclick=()=>{

  if(state==="item"){

    player.style.display="none"
    imgViewer.style.display="none"
    intro.style.display="none"

    if(current==="VIDEO") videoGrid.style.display="grid"
    if(current==="DESIGN") designGrid.style.display="block"
    if(current==="3D") threeDGrid.style.display="block"

    state="list"
    return
  }

  if(state==="list"){
    overlay.style.display="none"
    state="home"
  }
}

  if(state==="list"){
    overlay.style.display="none"
    state="home"
  }
}

</script>

</body>
</html>
