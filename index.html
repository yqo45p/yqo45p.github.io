<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

<style>
/* 全站字體 & 背景 & 內文字色 */
body {
    margin:0;
    font-family: 'Dela Gothic One', sans-serif;
    scroll-behavior: smooth;
    background:#D1CF75;
    color:#4F4744;
}

/* 導航列 */
nav {
    position: fixed; top:0; width:100%;
    background: rgba(141,153,91,0.9);
    display:flex; justify-content:center; padding:15px 0; z-index:10;
}
nav a { color:#fff; margin:0 25px; text-decoration:none; font-weight:bold; letter-spacing:1px; }
nav a:hover { text-decoration:underline; }

/* 分頁區塊 */
section {
    min-height:100vh; padding:120px 20px 60px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
}
section.visible { opacity:1; transform: translateY(0); }

/* Hero */
#hero {
    text-align:center; position:relative; overflow:hidden;
    background:url('hero.jpg') center/cover no-repeat;
}
#hero h1 {
    font-size:100px;      /* 標題大小 */
    margin-bottom:15px;
    color:#8D995B;
    text-shadow: none;    /* 不加邊框 */
}
#hero p { font-size:28px; color:#4F4744; }

/* Work 區 */
.projects {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
    gap:25px; margin-top:25px; width:90%; max-width:1000px;
}
.project {
    border:1px solid #8D995B; border-radius:10px; overflow:hidden;
    background:#F0EFC2; cursor:pointer; transition: transform 0.3s, box-shadow 0.3s;
}
.project img { width:100%; display:block; }
.project:hover { transform:scale(1.05); box-shadow:0 8px 25px rgba(0,0,0,0.3); }

/* 標題色 */
section h2, section h3 { margin-bottom:25px; color:#8D995B; letter-spacing:1px; }

/* 篩選按鈕 */
.filter-buttons { margin-bottom:20px; }
.filter-buttons button {
    padding:8px 18px; margin:0 10px;
    border:none; border-radius:5px; cursor:pointer;
    background:#8D995B; color:#fff; font-weight:bold;
    transition:0.3s;
}
.filter-buttons button:hover { background:#6a7448; }
.filter-buttons button.active { background:#333; }

/* Lightbox */
#lightbox {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:100;
}
#lightbox img { max-width:90%; max-height:90%; border-radius:8px; }
#lightbox span { position:absolute; top:30px; right:30px; font-size:40px; color:#fff; cursor:pointer; }

/* 影片區 */
.video-container { margin-top:25px; width:90%; max-width:800px; }
.video-container iframe { width:100%; height:450px; border:none; border-radius:8px; }
</style>
</head>

<body>

<nav>
  <a href="#about">About</a>
  <a href="#work">Work</a>
  <a href="#connect">Connect</a>
</nav>

<section id="hero">
  <h1>曾珮甄作品集</h1>
  <p>Editing / Design / 3D Modeling</p>
</section>

<section id="about">
  <h2>About</h2>
  <p>這裡可以寫你的自我介紹、專業能力或作品風格描述。</p>
</section>

<section id="work">
  <h2>Work</h2>

  <!-- 篩選按鈕 -->
  <div class="filter-buttons">
    <button data-filter="all" class="active">All</button>
    <button data-filter="editing">Editing</button>
    <button data-filter="design">Design</button>
    <button data-filter="modeling">3D Modeling</button>
  </div>

  <div class="projects">
    <!-- Editing -->
    <div class="project editing"><img src="editing1.jpg" alt="Editing Project 1"></div>
    <div class="project editing"><img src="editing2.jpg" alt="Editing Project 2"></div>
    <!-- Design -->
    <div class="project design"><img src="design1.jpg" alt="Design Project 1"></div>
    <div class="project design"><img src="design2.jpg" alt="Design Project 2"></div>
    <!-- 3D Modeling -->
    <div class="project modeling"><img src="model1.jpg" alt="3D Modeling Project 1"></div>
    <div class="project modeling"><img src="model2.jpg" alt="3D Modeling Project 2"></div>
  </div>

  <!-- 影片區示範 -->
  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
  </div>
</section>

<section id="connect">
  <h2>Connect</h2>
  <p>Email: <a href="mailto:zeng@example.com">zeng@example.com</a></p>
  <p>Line/社群帳號也可以放在這裡</p>
</section>

<div id="lightbox"><span id="close">&times;</span><img src="" alt=""></div>

<script>
// Lightbox
const projects = document.querySelectorAll('.project img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
const closeBtn = document.getElementById('close');
projects.forEach(img => {
  img.addEventListener('click', () => { lightbox.style.display = 'flex'; lightboxImg.src = img.src; });
});
closeBtn.addEventListener('click', () => { lightbox.style.display='none'; });
lightbox.addEventListener('click', (e)=>{ if(e.target===lightbox) lightbox.style.display='none'; });

// 滑動淡入動畫
const sections = document.querySelectorAll('section');
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{ if(entry.isIntersecting){ entry.target.classList.add('visible'); } });
}, { threshold:0.2 });
sections.forEach(section => observer.observe(section));

// 篩選功能
const filterButtons = document.querySelectorAll('.filter-buttons button');
const allProjects = document.querySelectorAll('.project');
filterButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    filterButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.getAttribute('data-filter');
    allProjects.forEach(p => {
      if(filter==='all'){ p.style.display='block'; }
      else{ p.style.display = p.classList.contains(filter) ? 'block':'none'; }
    });
  });
});
</script>

</body>
</html>
