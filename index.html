<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<title>曾珮甄作品集</title>

<style>
@font-face{
    font-family:'MantouSans';
    src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
    margin:0;
    font-family:'MantouSans',sans-serif;
    background:#D6CFC4;
    color:#87240E;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h1{ font-size:60px; font-weight: normal; color:#87240E; margin:0; }
h2{ font-size:36px; color:#87240E; margin:0; }
section{ padding:120px 20px; text-align:center; }

/* navbar */
nav{ position:fixed; top:20px; right:20px; display:flex; gap:20px; z-index:10; }
nav a{ text-decoration:none; color:#87240E; font-size:18px; }

/* hero */
#hero{ height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; }

/* about */
#about p{ font-size:20px; line-height:1.7; max-width:700px; margin:auto; }

/* category */
.category-btns{ margin:30px 0; }
.category-btns button{
    background:#D6CFC4;
    color:#87240E;
    border:2px solid #87240E;
    padding:10px 20px;
    margin:0 5px;
    cursor:pointer;
    font-family:'MantouSans';
    font-size:16px;
    border-radius:4px;
    transition:0.3s;
}

.category-btns button.active{
    background:#87240E;
    color:#D6CFC4;
}

/* masonry */
#all-projects{
    column-count:3;
    column-gap:20px;
    max-width:1100px;
    margin:40px auto;
}

@media (max-width:800px){ #all-projects{ column-count:2; } }

.project{
    break-inside:avoid;
    margin-bottom:20px;
    cursor:pointer;
    position:relative;
}

.project img{ width:100%; display:block; }

/* hover text */
.project-title{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.4);
    padding:10px;
    opacity:0;
    transition:0.3s;
    color:#FFFFFF;
}

.project:hover .project-title{ opacity:1; }

/* overlay */
#overlay{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
    z-index:999;
}

/* panel */
#project-panel{
    background:#D6CFC4;
    color:#87240E;
    padding:30px;
    max-width:800px;
    width:90%;
    max-height:85vh;
    overflow-y:auto;
    border-radius:6px;
    text-align:center;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
}

#panel-img{ max-width:60%; height:auto; margin-bottom:20px; }
#panel-video{ width:70%; height:380px; margin-bottom:20px; border:none; }
#panel-extra-images{ display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }

#panel-close{ position:absolute; top:10px; right:15px; font-size:28px; cursor:pointer; }

#connect{ padding:60px 20px; text-align:center; }

</style>
</head>
