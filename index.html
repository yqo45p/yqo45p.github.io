<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<!-- Google Fonts Dela Gothic One -->
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Dela Gothic One', sans-serif;
    scroll-behavior: smooth;
    background:#161917;
    color:#FFFFFF;
}

nav {
    position: fixed; top:0; width:100%;
    background: rgba(180,212,109,0.9);
    display:flex; justify-content:center; padding:15px 0; z-index:10;
}
nav a { color:#b4d46d; margin:0 25px; text-decoration:none; font-weight:bold; letter-spacing:1px; }
nav a:hover { text-decoration:underline; }

#hero h1, section h2, section h3 {
    font-family: 'Dela Gothic One', sans-serif;
    color:#b4d46d;
    letter-spacing:1px;
    margin-bottom:25px;
}

section {
    min-height:100vh; padding:120px 20px 60px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
}
section.visible { opacity:1; transform: translateY(0); }

#hero { text-align:center; position:relative; overflow:hidden; }
#hero h1 { font-size:70px; margin-bottom:15px; }
#hero p { font-size:28px; color:#FFFFFF; }

.projects {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
    gap:25px; margin-top:25px; width:90%; max-width:1000px;
}
.project {
    border:1px solid #b4d46d; border-radius:10px; overflow:hidden;
    background:#222; cursor:pointer; transition: transform 0.3s, box-shadow 0.3s;
}
.project img {
    width:100%;
    height:250px;
    object-fit:cover; /* 修正格子空白 */
    display:block;
}
.project:hover { transform:scale(1.05); box-shadow:0 8px 25px rgba(0,0,0,0.5); }

.filter-buttons { margin-bottom:20px; }
.filter-buttons button {
    padding:8px 18px; margin:0 10px;
    border:none; border-radius:5px; cursor:pointer;
    background:#b4d46d; color:#161917; font-weight:bold;
    transition:0.3s;
}
.filter-buttons button:hover { background:#95b34f; }
.filter-buttons button.active { background:#333; color:#b4d46d; }

#lightbox {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:100;
}
#lightbox img, #lightbox iframe {
    max-width:90%; max-height:90%; border-radius:8px;
}
#lightbox span { position:absolute; top:30px; right:30px; font-size:40px; color:#fff; cursor:pointer; }
</style>
</head>

<body>

<nav>
  <a href="#about">About</a>
  <a href="#work">Work</a>
  <a href="#connect">Connect</a>
</nav>

<section id="hero">
  <h1>曾珮甄作品集</h1>
  <p>Editing / Design / 3D Modeling</p>
</section>

<section id="about">
  <h2>About</h2>
  <p>這裡可以寫你的自我介紹、專業能力或作品風格描述。</p>
</section>

<section id="work">
  <h2>Work</h2>

  <div class="filter-buttons">
    <button data-filter="editing">Editing</button>
    <button data-filter="design" class="active">Design</button>
    <button data-filter="modeling">3D Modeling</button>
  </div>

  <div class="projects">
    <!-- Design 圖片 -->
    <div class="project design"><img src="design/shift.jpg" alt="Shift"></div>
    <div class="project design"><img src="design/filmfestival.png" alt="Film Festival"></div>
    <div class="project design"><img src="design/communicationcamp.jpg" alt="Communication Camp"></div>
    <div class="project design"><img src="design/voiceofzhongzheng.jpg" alt="Voice of Zhongzheng"></div>

    <!-- 剪輯影片封面圖（點擊後播放） -->
    <div class="project editing" data-video="https://www.youtube.com/embed/YSA-ws8PeJo"><img src="design/video1.jpg" alt="Video 1"></div>
    <div class="project editing" data-video="https://www.youtube.com/embed/k5CRxQ0rPTc"><img src="design/video2.jpg" alt="Video 2"></div>
    <div class="project editing" data-video="https://www.youtube.com/embed/DDLpt_OMKXY"><img src="design/video3.jpg" alt="Video 3"></div>
    <div class="project editing" data-video="https://www.youtube.com/embed/_tzyIj1j39Q"><img src="design/video4.jpg" alt="Video 4"></div>
    <div class="project editing" data-video="https://www.youtube.com/embed/D-h27S7wz5s"><img src="design/video5.jpg" alt="Video 5"></div>
    <div class="project editing" data-video="https://www.youtube.com/embed/7ZRsVUVbRbg"><img src="design/video6.jpg" alt="Video 6"></div>
  </div>
</section>

<section id="connect">
  <h2>Connect</h2>
  <p>Email: <a href="mailto:jane940410@gmail.com">jane940410@gmail.com</a></p>
</section>

<div id="lightbox"><span id="close">&times;</span></div>

<script>
// Lightbox 支援圖片與影片
const projects = document.querySelectorAll('.project');
const lightbox = document.getElementById('lightbox');

projects.forEach(proj => {
  proj.addEventListener('click', () => {
    lightbox.innerHTML = '<span id="close">&times;</span>'; // 重置內容
    if(proj.dataset.video){
        const iframe = document.createElement('iframe');
        iframe.src = proj.dataset.video;
        iframe.allow = "fullscreen";
        lightbox.appendChild(iframe);
    } else {
        const img = document.createElement('img');
        img.src = proj.querySelector('img').src;
        lightbox.appendChild(img);
    }
    lightbox.style.display = 'flex';

    document.getElementById('close').addEventListener('click', ()=>{ lightbox.style.display='none'; });
  });
});
lightbox.addEventListener('click', e=>{ if(e.target===lightbox) lightbox.style.display='none'; });

// 滑動淡入
const sections = document.querySelectorAll('section');
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry => { if(entry.isIntersecting){ entry.target.classList.add('visible'); } });
}, { threshold:0.2 });
sections.forEach(section => observer.observe(section));

// 篩選功能
const filterButtons = document.querySelectorAll('.filter-buttons button');
const allProjects = document.querySelectorAll('.project');
filterButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    filterButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.getAttribute('data-filter');
    allProjects.forEach(p => {
      p.style.display = p.classList.contains(filter) ? 'block':'none';
    });
  });
});
</script>

</body>
</html>
