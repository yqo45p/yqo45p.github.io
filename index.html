<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<link rel="icon" href="good/head.png?v=6">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

#work{
  text-align:center;
  padding:80px 20px;
}

#work img{
  width:300px;
  margin:20px;
  cursor:pointer;
}

/* overlay */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

#panel{
  background:#D6CFC4;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
  padding:25px;
}

#close-area{
  position:fixed;
  inset:0;
}

/* grid */
.masonry{
  column-count:3;
  column-gap:15px;
}

.project{
  break-inside:avoid;
  margin-bottom:15px;
  cursor:pointer;
  position:relative;
}

.project img{
  width:100%;
}

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:5px;
  opacity:0;
}

.project:hover .project-title{
  opacity:1;
}

/* detail */
#detail{
  display:none;
}

#detail img{
  width:100%;
  margin-bottom:15px;
}

#detail h3{
  margin:10px 0;
}

#player{
  width:100%;
  height:400px;
  border:none;
}
</style>
</head>

<body>

<section id="work">
<h2>Work</h2>

<img src="good/com.webp" id="btn-video">
<img src="good/table.webp" id="btn-design">
<img src="good/ca.webp" id="btn-3d">

</section>

<div id="overlay">
<div id="close-area"></div>

<div id="panel">

<h2 id="panel-title"></h2>

<div id="grid" class="masonry"></div>

<div id="detail">
<h3 id="d-title"></h3>
<p id="d-desc"></p>
<img id="d-img">
<iframe id="player"></iframe>
</div>

</div>
</div>

<script>

const data = [

/* DESIGN */
{cat:"design",img:"design/shift.jpg",title:"移面之詞主視覺",desc:"2026 主視覺設計"},
{cat:"design",img:"design/filmfestival.png",title:"第17屆瘋影展海報",desc:"2025 海報設計"},
{cat:"design",img:"design/communicationcamp.jpg",title:"中正傳播營海報",desc:"2024 活動設計"},
{cat:"design",img:"design/voiceofzhongzheng.jpg",title:"中正之聲2024主視覺",desc:"2024 主視覺設計"},
{cat:"design",img:"design/eye.png",title:"活動海報設計",desc:"2025"},
{cat:"design",img:"design/fb.png",title:"中正E報主視覺",desc:"2025"},
{cat:"design",img:"design/ghost.jpg",title:"活動海報設計",desc:"2025"},
{cat:"design",img:"design/news.png",title:"第二十三屆新傳獎海報",desc:"2025"},
{cat:"design",img:"design/one.png",title:"活動海報設計",desc:"2025"},
{cat:"design",img:"design/temperature.png",title:"溫度回收計畫專輯封面",desc:"2025 專輯設計"},

/* VIDEO */
{cat:"video",img:"video/aids.jpg",title:"從污名到教育—愛滋風險不分族群",desc:"2025｜攝影、剪輯",video:"https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1"},
{cat:"video",img:"video/crime.jpg",title:"創傷到馨生—犯保協會的重建之路",desc:"2025｜攝影、剪輯",video:"https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1"},
{cat:"video",img:"video/hurt.jpg",title:"與傷共行—那些尚未說完的事",desc:"2025｜攝影、剪輯",video:"https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1"},
{cat:"video",img:"video/narrowhouse.png",title:"窄房",desc:"2025｜攝影助理",video:"https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1"},
{cat:"video",img:"video/ravine.png",title:"山溝",desc:"2024｜剪輯、場記",video:"https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1"},
{cat:"video",img:"video/sony.png",title:"Sony收你的創意-影視製作工作坊",desc:"2025｜導演",video:"https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1"},
{cat:"video",img:"video/wendan.jpg",title:"滿園文旦成廢果",desc:"2025｜攝影、剪輯",video:"https://www.peopo.org/news/822048"},
{cat:"video",img:"video/camp.png",title:"中正傳播營回顧片",desc:"2025｜活動紀錄",video:"https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1"},
{cat:"video",img:"video/gogo.jpg",title:"出去走走",desc:"2025 劇情短片",video:"https://www.youtube.com/embed/iD759dRtgIY?autoplay=1"},

/* 3D */
{cat:"3d",img:"d/shixian/shixian1.jpg",title:"世賢圖書館展場空間規劃",desc:"2026 空間設計"},
{cat:"3d",img:"d/library/library1.jpg",title:"嘉義市圖書館展場規劃",desc:"2026 空間設計"}

]

const overlay=document.getElementById("overlay")
const grid=document.getElementById("grid")
const detail=document.getElementById("detail")
const player=document.getElementById("player")

function render(cat){
  grid.innerHTML=""
  grid.style.display="block"
  detail.style.display="none"
  player.src=""

  data.filter(d=>d.cat===cat).forEach(d=>{
    const el=document.createElement("div")
    el.className="project"

    el.innerHTML=`
      <img src="${d.img}">
      <div class="project-title">${d.title}</div>
    `

    el.onclick=()=>{
      grid.style.display="none"
      detail.style.display="block"

      document.getElementById("d-title").textContent=d.title
      document.getElementById("d-desc").textContent=d.desc
      document.getElementById("d-img").src=d.img

      if(d.video){
        player.style.display="block"
        player.src=d.video
      }else{
        player.style.display="none"
      }
    }

    grid.appendChild(el)
  })
}

document.getElementById("btn-video").onclick=()=>{overlay.style.display="flex";render("video")}
document.getElementById("btn-design").onclick=()=>{overlay.style.display="flex";render("design")}
document.getElementById("btn-3d").onclick=()=>{overlay.style.display="flex";render("3d")}

document.getElementById("close-area").onclick=()=>{
  overlay.style.display="none"
  player.src=""
}

</script>

</body>
</html>
