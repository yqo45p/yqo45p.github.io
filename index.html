<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
  overflow-x:hidden;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

/* com.webp（只微調，不亂放大） */
#work-computer{
  width:360px;
  display:block;
  margin:25px auto;
  cursor:pointer;
  transition:0.2s;
}
#work-computer:hover{ transform:scale(1.04); }

/* GRID */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  position:relative;
  cursor:pointer;
}

.project img{ width:100%; display:block; }

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.45);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* OVERLAY（原本作品彈窗） */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#project-panel{
  background:#D6CFC4;
  color:#87240E;
  padding:30px;
  max-width:800px;
  width:90%;
  max-height:85vh;
  overflow-y:auto;
  border-radius:6px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#panel-img{ max-width:60%; }
#panel-video{ width:70%; height:380px; display:none; border:none; }

/* =========================
   電腦 UI 視窗
========================= */
#computerOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:1000;
  justify-content:center;
  align-items:center;
}

#computerPanel{
  width:950px;
  height:80vh;
  background:#D6CFC4;
  display:flex;
  border-radius:10px;
  overflow:hidden;
}

/* 左：video瀑布流 */
#videoArea{
  flex:1;
  column-count:2;
  column-gap:15px;
  padding:15px;
  overflow-y:auto;
}

.video-item{
  position:relative;
  margin-bottom:15px;
  cursor:pointer;
}

.video-item img{ width:100%; display:block; }

.video-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:#fff;
  font-size:13px;
  padding:6px;
  opacity:0;
}

.video-item:hover .video-title{ opacity:1; }

/* 右：電腦圖 */
#computerSide{
  width:320px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#cfc7bb;
}

#computerSide img{
  width:85%;
}

/* 播放器 */
#player{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  display:none;
  background:black;
}

</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="work-computer">

<!-- DESIGN + 3D -->
<div id="all-projects">

<div class="project" data-cat="design"><img src="design/shift.jpg"><div class="project-title">Shift</div></div>
<div class="project" data-cat="design"><img src="design/filmfestival.png"><div class="project-title">Film</div></div>

<div class="project" data-cat="3d"><img src="d/shixian/shixian1.jpg"><div class="project-title">3D</div></div>

</div>
</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- =========================
     電腦 UI（video入口）
========================= -->
<div id="computerOverlay">
  <div id="computerPanel">

    <!-- 左：video瀑布 -->
    <div id="videoArea">

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><div class="video-title">從污名到教育</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><div class="video-title">創傷到馨生</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><div class="video-title">與傷共行</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1')">
        <img src="video/narrowhouse.png"><div class="video-title">窄房</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1')">
        <img src="video/ravine.png"><div class="video-title">山溝</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1')">
        <img src="video/sony.png"><div class="video-title">Sony</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.peopo.org/news/822048')">
        <img src="video/wendan.jpg"><div class="video-title">文旦</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1')">
        <img src="video/camp.png"><div class="video-title">營隊</div>
      </div>

      <div class="video-item" onclick="openVideo('https://www.youtube.com/embed/iD759dRtgIY?autoplay=1')">
        <img src="video/gogo.jpg"><div class="video-title">出去走走</div>
      </div>

    </div>

    <!-- 右：電腦 -->
    <div id="computerSide">
      <img src="good/com.webp">
    </div>

    <!-- 播放器 -->
    <iframe id="player" allow="autoplay"></iframe>

  </div>
</div>

<!-- 原本作品彈窗 -->
<div id="overlay">
  <div id="project-panel">
    <img id="panel-img">
    <iframe id="panel-video"></iframe>
  </div>
</div>

<script>

const computerOverlay = document.getElementById("computerOverlay")
const player = document.getElementById("player")
const videoArea = document.getElementById("videoArea")

/* 開電腦UI */
document.getElementById("work-computer").onclick = ()=>{
  computerOverlay.style.display="flex"
}

/* 播放影片 */
function openVideo(url){
  player.style.display="block"
  player.src=url
  videoArea.style.opacity="0"
}

/* 點空白回列表（不關閉） */
computerOverlay.onclick=(e)=>{
  if(e.target===computerOverlay){
    player.style.display="none"
    player.src=""
    videoArea.style.opacity="1"
  }
}

/* 防止點內部關掉 */
document.getElementById("computerPanel").onclick=(e)=>e.stopPropagation()

</script>

</body>
</html>
