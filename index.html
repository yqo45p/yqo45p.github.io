<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<style>
@font-face{
  font-family:'MantouSans';
  src:url('MantouSans-Regular.ttf') format('truetype');
}

body{
  margin:0;
  font-family:'MantouSans',sans-serif;
  background:#D6CFC4;
  color:#87240E;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-images{
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.hero-images img{ height:220px; }

#hero video{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55%;
}

/* WORK */
#work{
  text-align:center;
  padding:80px 20px;
}

/* 電腦入口 */
#work-computer{
  width:420px;
  display:block;
  margin:30px auto;
  cursor:pointer;
  transition:0.3s;
}
#work-computer:hover{ transform:scale(1.05); }

/* GRID */
#all-projects{
  column-count:3;
  column-gap:20px;
  max-width:1100px;
  margin:auto;
}

.project{
  break-inside:avoid;
  margin-bottom:20px;
  position:relative;
  cursor:pointer;
}

.project img{
  width:100%;
  display:block;
}

.project-title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:8px;
  opacity:0;
  transition:0.3s;
}

.project:hover .project-title{
  opacity:1;
}

/* OVERLAY */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:999;
  justify-content:center;
  align-items:center;
}

/* 電腦視窗 */
#videoWindow{
  width:920px;
  height:600px;
  background:#D6CFC4;
  display:flex;
  gap:20px;
  padding:20px;
  border-radius:8px;
}

/* 左側影片列表 */
#videoList{
  width:320px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.video-item{
  position:relative;
  cursor:pointer;
}

.video-item img{
  width:100%;
  display:block;
}

.video-item span{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.5);
  color:#fff;
  padding:6px;
  font-size:14px;
  opacity:0;
  transition:0.3s;
}

.video-item:hover span{
  opacity:1;
}

/* 右側播放器 */
#playerBox{
  flex:1;
  background:black;
}

#player{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <div class="hero-images">
    <img src="good/zeng.png">
    <img src="good/pei.png">
    <img src="good/zhen.png">
  </div>

  <video autoplay muted loop playsinline>
    <source src="good/head.webm">
  </video>
</section>

<!-- WORK -->
<section id="work">

<h2>Work</h2>

<img src="good/com.webp" id="work-computer">

<div id="all-projects">

<!-- DESIGN（完整10個） -->
<div class="project"><img src="design/shift.jpg"><div class="project-title">移面之詞主視覺</div></div>
<div class="project"><img src="design/filmfestival.png"><div class="project-title">第17屆瘋影展海報</div></div>
<div class="project"><img src="design/communicationcamp.jpg"><div class="project-title">中正傳播營海報</div></div>
<div class="project"><img src="design/voiceofzhongzheng.jpg"><div class="project-title">中正之聲2024</div></div>
<div class="project"><img src="design/eye.png"><div class="project-title">活動海報</div></div>
<div class="project"><img src="design/fb.png"><div class="project-title">中正E報</div></div>
<div class="project"><img src="design/ghost.jpg"><div class="project-title">活動海報</div></div>
<div class="project"><img src="design/news.png"><div class="project-title">新傳獎海報</div></div>
<div class="project"><img src="design/one.png"><div class="project-title">活動海報</div></div>
<div class="project"><img src="design/temperature.png"><div class="project-title">專輯封面</div></div>

<!-- 3D（完整） -->
<div class="project">
  <img src="d/shixian/shixian1.jpg">
  <div class="project-title">世賢圖書館展場</div>
</div>

<div class="project">
  <img src="d/library/library1.jpg">
  <div class="project-title">嘉義圖書館展場</div>
</div>

</div>
</section>

<!-- CONNECT -->
<section id="connect">
<h2>Connect</h2>
<p>Email: jane940410@gmail.com</p>
</section>

<!-- OVERLAY -->
<div id="overlay">

  <div id="videoWindow">

    <!-- VIDEO LIST（完整9支） -->
    <div id="videoList">

      <div class="video-item" onclick="play('https://www.youtube.com/embed/D-h27S7wz5s?autoplay=1')">
        <img src="video/aids.jpg"><span>從污名到教育</span>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/_tzyIj1j39Q?autoplay=1')">
        <img src="video/crime.jpg"><span>創傷到馨生</span>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/DDLpt_OMKXY?autoplay=1')">
        <img src="video/hurt.jpg"><span>與傷共行</span>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/ODA4hvMLTbk?autoplay=1')">
        <img src="video/narrowhouse.png"><span>窄房</span>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/ANlh-9-dZR8?autoplay=1')">
        <img src="video/ravine.png"><span>山溝</span>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/YSA-ws8PeJo?autoplay=1')">
        <img src="video/sony.png"><span>Sony工作坊</span>
      </div>

      <div class="video-item" onclick="play('https://www.peopo.org/news/822048')">
        <img src="video/wendan.jpg"><span>文旦新聞</span>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/k5CRxQ0rPTc?autoplay=1')">
        <img src="video/camp.png"><span>傳播營</span>
      </div>

      <div class="video-item" onclick="play('https://www.youtube.com/embed/iD759dRtgIY?autoplay=1')">
        <img src="video/gogo.jpg"><span>出去走走</span>
      </div>

    </div>

    <!-- PLAYER -->
    <div id="playerBox">
      <iframe id="player"></iframe>
    </div>

  </div>
</div>

<script>

const overlay=document.getElementById("overlay")
const player=document.getElementById("player")
const workComputer=document.getElementById("work-computer")

/* 開電腦 */
workComputer.onclick=()=>{
  overlay.style.display="flex"
}

/* 播放影片 */
function play(url){
  player.src=url
}

/* 點空白關閉 */
overlay.onclick=()=>{
  overlay.style.display="none"
  player.src=""
}

/* 防止內部點擊關閉 */
document.getElementById("videoWindow").onclick=(e)=>{
  e.stopPropagation()
}

</script>

</body>
</html>
